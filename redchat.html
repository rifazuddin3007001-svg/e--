<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>RedChaat Final</title>

<style>
:root{
  --primary:#00bcd4;
  --accent:#ffd54f;
  --bg:#e0f7fa;
  --card:#fff;
}
body{margin:0;font-family:sans-serif;background:var(--bg);}
header{background:var(--primary);color:#fff;padding:10px;display:flex;justify-content:space-between;}
.screen{display:none;padding:10px;}
.active{display:block;}
.chatItem{background:var(--card);padding:10px;margin:5px;border-radius:10px;}
.chatBox{height:55vh;overflow:auto;background:#fff;padding:10px;border-radius:10px;}
.msg{padding:8px;margin:5px;border-radius:10px;max-width:70%;}
.me{background:var(--accent);margin-left:auto;}
.other{background:#ddd;}
.nav{position:fixed;bottom:0;width:100%;display:flex;background:var(--primary);}
.nav button{flex:1;color:#fff;background:none;border:none;padding:10px;}
</style>

</head>

<body>

<header>
RedChaat Final
<button onclick="logout()">Logout</button>
</header>

<!-- AUTH -->
<div id="auth" class="screen active">
<input id="lid" placeholder="User ID">
<input id="lpass" placeholder="Password">
<button onclick="login()">Login</button>

<input id="sid" placeholder="New ID">
<input id="spass" placeholder="Password">
<button onclick="signup()">Signup</button>
</div>

<!-- CHATS -->
<div id="chats" class="screen">
<button onclick="addFriend()">➕ Add Friend</button>
<div id="chatList"></div>
</div>

<!-- CHAT -->
<div id="chatWindow" class="screen">
<button onclick="back()">⬅ Back</button>
<h3 id="chatName"></h3>

<div class="chatBox" id="chatBox"></div>

<input id="msg" placeholder="Message">
<button onclick="send()">Send</button>
</div>

<div class="nav hidden" id="nav">
<button onclick="show('chats')">Chats</button>
</div>

<script>
const db="https://redchaat-ffad2-default-rtdb.firebaseio.com/";
let user=localStorage.getItem("user");
let current=null;

/* AUTH */
async function signup(){
 let id=sid.value, pass=spass.value;
 await fetch(db+"users/"+id+".json",{method:"PUT",body:JSON.stringify({password:pass,friends:{}})});
 alert("Signup done");
}

async function login(){
 let id=lid.value, pass=lpass.value;
 let r=await fetch(db+"users/"+id+".json");
 let d=await r.json();
 if(!d||d.password!=pass)return alert("Error");
 localStorage.setItem("user",id);
 location.reload();
}

/* INIT */
if(user){
 auth.classList.remove("active");
 nav.classList.remove("hidden");
 show("chats");
 loadChats();
 setInterval(loadChats,3000);
}

/* NAV */
function show(s){
 document.querySelectorAll(".screen").forEach(e=>e.classList.remove("active"));
 document.getElementById(s).classList.add("active");
}

/* ADD FRIEND */
async function addFriend(){
 let f = prompt("Enter Friend ID");

 if(!f || f===user) return alert("Invalid");

 let check = await fetch(db+"users/"+f+".json");
 let exists = await check.json();

 if(!exists) return alert("User not found");

 await fetch(db+"users/"+user+"/friends/"+f+".json",{method:"PUT",body:"true"});
 await fetch(db+"users/"+f+"/friends/"+user+".json",{method:"PUT",body:"true"});

 alert("Friend added");
 loadChats();
}

/* LOAD FRIEND LIST */
async function loadChats(){
 let r=await fetch(db+"users/"+user+"/friends.json");
 let d=await r.json();

 chatList.innerHTML="";

 if(!d) return;

 Object.keys(d).forEach(f=>{
  let div=document.createElement("div");
  div.className="chatItem";
  div.innerText=f;
  div.onclick=()=>openChat(f);
  chatList.appendChild(div);
 });
}

/* CHAT */
function cid(a,b){
 return a<b?a+"_"+b:b+"_"+a;
}

function openChat(f){
 current=f;
 chatName.innerText=f;
 show("chatWindow");
 loadChat();

 setInterval(()=>{
  if(current) loadChat();
 },2000);
}

/* SEND */
async function send(){
 if(!current) return alert("Select friend");

 let id=Date.now();

 await fetch(db+"chats/"+cid(user,current)+"/"+id+".json",{
  method:"PUT",
  body:JSON.stringify({
    from:user,
    text:msg.value,
    time:id
  })
 });

 msg.value="";
}

/* LOAD CHAT */
async function loadChat(){
 let r=await fetch(db+"chats/"+cid(user,current)+".json");
 let d=await r.json();

 chatBox.innerHTML="";

 if(!d) return;

 Object.values(d).forEach(m=>{
  let div=document.createElement("div");
  div.className="msg "+(m.from==user?"me":"other");
  div.innerText=m.text;
  chatBox.appendChild(div);
 });

 chatBox.scrollTop=chatBox.scrollHeight;
}

/* BACK */
function back(){
 show("chats");
}

/* LOGOUT */
function logout(){
 localStorage.removeItem("user");
 location.reload();
}
</script>

</body>
</html>
