<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RedChat Premium</title>

<style>
:root {
  --bg: #ffffff;
  --text: #000;
  --primary: #e50914;
}
.dark {
  --bg: #0d0d0d;
  --text: #fff;
}
body {
  margin:0;
  font-family: Arial, sans-serif;
  background: var(--bg);
  color: var(--text);
}
header {
  position: sticky;
  top:0;
  background: var(--primary);
  color:#fff;
  padding:10px;
  display:flex;
  justify-content:space-between;
}
.container { padding:10px; }

input, button {
  width:100%;
  padding:10px;
  margin:5px 0;
}
.chat-box {
  height:60vh;
  overflow-y:auto;
  border:1px solid #ccc;
  padding:10px;
}
.message {
  padding:8px;
  margin:5px;
  border-radius:8px;
}
.me { background:#dcf8c6; text-align:right; }
.other { background:#eee; }

.bottom-nav {
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
  background:#222;
}
.bottom-nav button {
  flex:1;
  color:#fff;
  background:none;
  border:none;
}

.hidden { display:none; }
</style>
</head>

<body>

<header>
  <span>RedChat Premium</span>
  <div>
    <button onclick="toggleDark()">🌙</button>
  </div>
</header>

<div class="container">

<!-- AUTH -->
<div id="auth">
  <h3>Login</h3>
  <input id="loginId" placeholder="User ID">
  <input id="loginPass" type="password" placeholder="Password">
  <button onclick="login()">Login</button>

  <h3>Signup</h3>
  <input id="name" placeholder="Full Name">
  <input id="userid" placeholder="User ID">
  <input id="phone" placeholder="Phone">
  <input id="pass" type="password" placeholder="Password">
  <input id="sq" placeholder="Security Question">
  <input id="sa" placeholder="Answer">
  <button onclick="signup()">Signup</button>
</div>

<!-- APP -->
<div id="app" class="hidden">
  <h3 id="welcome"></h3>

  <div id="chat">
    <div class="chat-box" id="chatBox"></div>

    <input id="msg" placeholder="Type message">
    <button onclick="sendMessage()">Send</button>
    <button onclick="startVoice()">🎤</button>
  </div>
</div>

</div>

<div class="bottom-nav hidden" id="nav">
  <button onclick="showTab('chat')">Chats</button>
  <button onclick="showTab('status')">Status</button>
  <button onclick="showTab('people')">People</button>
  <button onclick="showTab('profile')">Profile</button>
</div>

<script>
const db = "https://test-chat-8b59b-default-rtdb.firebaseio.com/";

let currentUser = localStorage.getItem("user") || null;
let currentChat = null;

/* ===========================
   AUTH FUNCTIONS
=========================== */

async function signup() {
  const user = {
    name: name.value,
    phone: phone.value,
    password: pass.value,
    sq: sq.value,
    sa: sa.value,
    online: true
  };

  await fetch(db+"users/"+userid.value+".json", {
    method:"PUT",
    body: JSON.stringify(user)
  });

  alert("Signup Success");
}

async function login() {
  const res = await fetch(db+"users/"+loginId.value+".json");
  const data = await res.json();

  if(data && data.password === loginPass.value) {
    localStorage.setItem("user", loginId.value);
    location.reload();
  } else {
    alert("Invalid login");
  }
}

/* ===========================
   INIT APP
=========================== */

if(currentUser){
  document.getElementById("auth").classList.add("hidden");
  document.getElementById("app").classList.remove("hidden");
  document.getElementById("nav").classList.remove("hidden");

  welcome.innerText = "Welcome " + currentUser;

  setOnline(true);
  loadMessages();
  setInterval(loadMessages, 3000);
}

/* ===========================
   CHAT SYSTEM
=========================== */

async function sendMessage(){
  const msgText = msg.value;
  if(!msgText) return;

  const id = Date.now();

  await fetch(db+"chats/global/"+id+".json",{
    method:"PUT",
    body: JSON.stringify({
      sender: currentUser,
      text: msgText,
      time: new Date().toLocaleTimeString()
    })
  });

  msg.value="";
}

async function loadMessages(){
  const res = await fetch(db+"chats/global.json");
  const data = await res.json();

  chatBox.innerHTML="";

  for(let id in data){
    let m = data[id];

    let div = document.createElement("div");
    div.className = "message " + (m.sender === currentUser ? "me":"other");
    div.innerText = m.text + " ("+m.time+")";

    chatBox.appendChild(div);
  }

  chatBox.scrollTop = chatBox.scrollHeight;
}

/* ===========================
   ONLINE STATUS
=========================== */

async function setOnline(status){
  await fetch(db+"users/"+currentUser+"/online.json",{
    method:"PUT",
    body: JSON.stringify(status)
  });
}

/* ===========================
   DARK MODE
=========================== */

function toggleDark(){
  document.body.classList.toggle("dark");
}

/* ===========================
   VOICE TYPING
=========================== */

function startVoice(){
  const rec = new webkitSpeechRecognition();
  rec.lang = "bn-IN";
  rec.start();

  rec.onresult = function(e){
    msg.value = e.results[0][0].transcript;
  }
}

/* ===========================
   TABS (basic)
=========================== */

function showTab(tab){
  alert("Switch to " + tab + " (extend UI here)");
}

/* ===========================
   AUTO LOGOUT ON CLOSE
=========================== */
window.onbeforeunload = ()=>{
  setOnline(false);
};

</script>
</body>
</html>
