<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>RedChaat v5.5</title>

<style>
body{margin:0;font-family:sans-serif;background:#111;color:#fff;}
header{background:#ff2e63;padding:12px;text-align:center;}
.screen{display:none;padding:10px;}
.active{display:block;}

.chatItem{padding:10px;border-bottom:1px solid #333;display:flex;align-items:center;gap:10px;}
.chatItem img{width:35px;height:35px;border-radius:50%;}

.chatBox{height:55vh;overflow:auto;background:#1a1a1a;padding:10px;}

.msg{padding:8px;margin:5px;border-radius:8px;max-width:70%;}
.me{background:#00c853;margin-left:auto;}
.other{background:#444;}

img.chatImg{max-width:100%;border-radius:8px;margin-top:5px;}

.bottom{position:fixed;bottom:0;width:100%;display:flex;background:#222;}
.bottom button{flex:1;color:#fff;background:none;border:none;}

.hidden{display:none;}
</style>
</head>

<body>

<header>🔥 RedChaat</header>

<!-- AUTH -->
<div id="auth" class="screen active">
<input id="lid" placeholder="User ID">
<input id="lpass" placeholder="Password">
<button onclick="login()">Login</button>

<input id="sid" placeholder="New ID">
<input id="spass" placeholder="Password">
<button onclick="signup()">Signup</button>
</div>

<!-- CHATS -->
<div id="chats" class="screen"></div>

<!-- CHAT WINDOW -->
<div id="chatWindow" class="screen">
<button onclick="back()">⬅ Back</button>
<h3 id="chatName"></h3>

<div class="chatBox" id="chatBox"></div>

<input id="msg" placeholder="Message">
<button onclick="send()">Send</button>
<button onclick="sendImage()">📷</button>
<button onclick="recordVoice()">🎤</button>
<button onclick="oneTime()">👁️</button>
</div>

<!-- STATUS -->
<div id="status" class="screen">
<input id="statusText" placeholder="Text status">
<button onclick="addStatus()">Post</button>
<button onclick="addPhotoStatus()">📷 Photo</button>
<div id="statusList"></div>
</div>

<!-- PROFILE -->
<div id="profile" class="screen">
<h3>Profile</h3>
<img id="dp" width="80">
<input type="file" onchange="uploadDP(this)">
</div>

<div class="bottom hidden" id="nav">
<button onclick="show('chats')">Chats</button>
<button onclick="show('status')">Status</button>
<button onclick="show('profile')">Profile</button>
</div>

<script>
const db="https://redchaat-ffad2-default-rtdb.firebaseio.com/";
let user=localStorage.getItem("user");
let current=null;
let one=false;

/* AUTH */
async function signup(){
 await fetch(db+"users/"+sid.value+".json",{
  method:"PUT",
  body:JSON.stringify({password:spass.value})
 });
 alert("Done");
}

async function login(){
 let r=await fetch(db+"users/"+lid.value+".json");
 let d=await r.json();
 if(!d||d.password!=lpass.value)return alert("Error");
 localStorage.setItem("user",lid.value);
 location.reload();
}

/* INIT */
if(user){
 auth.classList.remove("active");
 nav.classList.remove("hidden");
 show("chats");
 loadChats();
 loadDP();
}

/* NAV */
function show(s){
 document.querySelectorAll(".screen").forEach(e=>e.classList.remove("active"));
 document.getElementById(s).classList.add("active");
}

/* CHAT LIST */
async function loadChats(){
 let r=await fetch(db+"users/"+user+"/friends.json");
 let d=await r.json();
 chats.innerHTML="";

 if(!d)return;

 for(let f in d){
  let u=await fetch(db+"users/"+f+".json");
  let ud=await u.json();

  let div=document.createElement("div");
  div.className="chatItem";

  let img=document.createElement("img");
  img.src=ud?.dp||"";
  div.appendChild(img);

  let name=document.createElement("span");
  name.innerText=f;
  div.appendChild(name);

  div.onclick=()=>openChat(f);
  chats.appendChild(div);
 }
}

/* CHAT */
function cid(a,b){return a<b?a+"_"+b:b+"_"+a;}

function openChat(f){
 current=f;
 chatName.innerText=f;
 show("chatWindow");
 loadChat();
 setInterval(loadChat,2000);
}

async function send(){
 let id=Date.now();
 await fetch(db+"chats/"+cid(user,current)+"/"+id+".json",{
  method:"PUT",
  body:JSON.stringify({from:user,text:msg.value,one:one,time:id})
 });
 msg.value="";
 one=false;
}

function oneTime(){
 one=true;
 alert("One-time ON");
}

/* IMAGE */
function sendImage(){
 let input=document.createElement("input");
 input.type="file";
 input.onchange=()=>{
  let r=new FileReader();
  r.onload=async()=>{
    await fetch(db+"chats/"+cid(user,current)+"/"+Date.now()+".json",{
      method:"PUT",
      body:JSON.stringify({from:user,img:r.result})
    });
  };
  r.readAsDataURL(input.files[0]);
 };
 input.click();
}

/* VOICE */
function recordVoice(){
 navigator.mediaDevices.getUserMedia({audio:true}).then(stream=>{
  let rec=new MediaRecorder(stream);
  let chunks=[];
  rec.ondataavailable=e=>chunks.push(e.data);
  rec.onstop=()=>{
    let blob=new Blob(chunks);
    let reader=new FileReader();
    reader.onload=async()=>{
      await fetch(db+"chats/"+cid(user,current)+"/"+Date.now()+".json",{
        method:"PUT",
        body:JSON.stringify({from:user,audio:reader.result})
      });
    };
    reader.readAsDataURL(blob);
  };
  rec.start();
  setTimeout(()=>rec.stop(),3000);
 });
}

/* LOAD CHAT */
async function loadChat(){
 let r=await fetch(db+"chats/"+cid(user,current)+".json");
 let d=await r.json();
 chatBox.innerHTML="";

 if(!d)return;

 Object.entries(d).forEach(([id,m])=>{

  if(m.one && Date.now()-m.time>15000){
    fetch(db+"chats/"+cid(user,current)+"/"+id+".json",{method:"DELETE"});
    return;
  }

  let div=document.createElement("div");
  div.className="msg "+(m.from==user?"me":"other");

  if(m.text) div.innerText=m.text;

  if(m.img){
    let img=document.createElement("img");
    img.src=m.img;
    img.className="chatImg";
    div.appendChild(img);
  }

  if(m.audio){
    let a=document.createElement("audio");
    a.controls=true;
    a.src=m.audio;
    div.appendChild(a);
  }

  chatBox.appendChild(div);
 });

 chatBox.scrollTop=chatBox.scrollHeight;
}

/* PROFILE DP */
function uploadDP(input){
 let r=new FileReader();
 r.onload=()=>{
  fetch(db+"users/"+user+"/dp.json",{method:"PUT",body:JSON.stringify(r.result)});
  dp.src=r.result;
 };
 r.readAsDataURL(input.files[0]);
}

async function loadDP(){
 let r=await fetch(db+"users/"+user+"/dp.json");
 let d=await r.json();
 if(d) dp.src=d;
}

/* STATUS */
async function addStatus(){
 await fetch(db+"status/"+user+"/"+Date.now()+".json",{
  method:"PUT",
  body:JSON.stringify({text:statusText.value,time:Date.now(),view:{},react:{}})
 });
 loadStatus();
}

function addPhotoStatus(){
 let input=document.createElement("input");
 input.type="file";
 input.onchange=()=>{
  let r=new FileReader();
  r.onload=async()=>{
    await fetch(db+"status/"+user+"/"+Date.now()+".json",{
      method:"PUT",
      body:JSON.stringify({img:r.result,time:Date.now(),view:{},react:{}})
    });
    loadStatus();
  };
  r.readAsDataURL(input.files[0]);
 };
 input.click();
}

async function loadStatus(){
 let r=await fetch(db+"status.json");
 let d=await r.json();
 statusList.innerHTML="";

 if(!d)return;

 Object.entries(d).forEach(([u,s])=>{
  Object.entries(s).forEach(([id,st])=>{
    if(Date.now()-st.time>86400000)return;

    let div=document.createElement("div");
    div.innerText=u+": ";

    if(st.text) div.innerText+=st.text;

    if(st.img){
      let img=document.createElement("img");
      img.src=st.img;
      img.style.width="100%";
      div.appendChild(img);
    }

    div.onclick=()=>{
      fetch(db+"status/"+u+"/"+id+"/view/"+user+".json",{method:"PUT",body:"true"});
    };

    if(u==user){
      div.innerText+=" | Seen: "+Object.keys(st.view||{}).join(",");
    }

    statusList.appendChild(div);
  });
 });
}

/* BACK */
function back(){show("chats");}
</script>

</body>
</html>
