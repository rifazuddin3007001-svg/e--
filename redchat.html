<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>🔥 RedChaat Ultra Pro v4</title>

<style>
body{margin:0;font-family:sans-serif;background:#0f0f0f;color:#fff;}
header{background:#ff2e63;padding:12px;text-align:center;font-size:20px;}
input,button{width:100%;padding:10px;margin:5px 0;border:none;border-radius:6px;}
button{background:#ff2e63;color:#fff;}
.chat{height:45vh;overflow:auto;background:#111;padding:10px;}
.msg{padding:8px;margin:5px;border-radius:8px;max-width:75%;position:relative;}
.me{background:#00c853;margin-left:auto;}
.other{background:#444;}
.nav{position:fixed;bottom:0;width:100%;display:flex;background:#222;}
.nav button{flex:1;background:none;color:#fff;}
.hidden{display:none;}
.small{font-size:11px;opacity:.7;}
.react{margin-top:5px;}
.react span{margin-right:6px;cursor:pointer;}
.statusBox{background:#1a1a1a;padding:8px;border-radius:8px;margin:6px 0;}
.viewer{font-size:11px;color:#aaa;}
</style>
</head>

<body>

<header>🔥 RedChaat Ultra Pro v4</header>

<div id="auth">
<h3>Signup</h3>
<input id="sid" placeholder="User ID">
<input id="spass" type="password" placeholder="Password">
<button onclick="signup()">Signup</button>

<h3>Login</h3>
<input id="lid" placeholder="User ID">
<input id="lpass" type="password">
<button onclick="login()">Login</button>
</div>

<div id="app" class="hidden">

<h3 id="me"></h3>

<!-- ONLINE STATUS -->
<p id="statusText" class="small"></p>

<!-- FRIENDS -->
<div id="friends"></div>

<!-- STATUS -->
<div class="statusBox">
<input id="statusInput" placeholder="Write status">
<button onclick="uploadStatus()">Post Status</button>
<div id="statusList"></div>
</div>

<!-- CHAT -->
<div class="chat" id="chat"></div>

<input id="msg" placeholder="Message">
<button onclick="send()">Send</button>

</div>

<div class="nav hidden" id="nav">
<button onclick="logout()">Logout</button>
</div>

<script>
const db="https://redchaat-ffad2-default-rtdb.firebaseio.com/";
let user=localStorage.getItem("user");
let current=null;
let lastMsgTime=0;

/* ===== AUTH ===== */
async function signup(){
 let id=sid.value, pass=spass.value;
 if(!id||!pass)return alert("Fill");
 let r=await fetch(db+"users/"+id+".json");
 if(await r.json())return alert("Exists");

 await fetch(db+"users/"+id+".json",{
  method:"PUT",
  body:JSON.stringify({password:pass,friends:{},lastSeen:Date.now(),online:true})
 });
 alert("Done");
}

async function login(){
 let id=lid.value, pass=lpass.value;
 let r=await fetch(db+"users/"+id+".json");
 let d=await r.json();
 if(!d)return alert("No user");
 if(d.password!=pass)return alert("Wrong");

 localStorage.setItem("user",id);
 location.reload();
}

/* ===== INIT ===== */
if(user){
 auth.classList.add("hidden");
 app.classList.remove("hidden");
 nav.classList.remove("hidden");
 me.innerText="You: "+user;

 setOnline(true);
 loadFriends();
 setInterval(loadChat,2000);
 setInterval(updateLastSeen,5000);
 setInterval(loadStatus,5000);
 requestNotify();
}

/* ===== ONLINE / LAST SEEN ===== */
async function setOnline(s){
 await fetch(db+"users/"+user+"/online.json",{method:"PUT",body:JSON.stringify(s)});
}
async function updateLastSeen(){
 await fetch(db+"users/"+user+"/lastSeen.json",{method:"PUT",body:Date.now()});
}

async function showStatus(u){
 let r=await fetch(db+"users/"+u+".json");
 let d=await r.json();
 if(!d)return;
 if(d.online) statusText.innerText="🟢 Online";
 else statusText.innerText="Last seen: "+new Date(d.lastSeen).toLocaleTimeString();
}

/* ===== FRIEND ===== */
async function loadFriends(){
 let r=await fetch(db+"users/"+user+"/friends.json");
 let d=await r.json();
 friends.innerHTML="";

 let add=document.createElement("input");
 add.placeholder="Add friend";
 add.onchange=async()=>{
  let f=add.value;
  await fetch(db+"users/"+user+"/friends/"+f+".json",{method:"PUT",body:"true"});
  await fetch(db+"users/"+f+"/friends/"+user+".json",{method:"PUT",body:"true"});
  loadFriends();
 };
 friends.appendChild(add);

 if(!d)return;
 Object.keys(d).forEach(f=>{
  let b=document.createElement("button");
  b.innerText=f;
  b.onclick=()=>{
   current=f;
   showStatus(f);
  };
  friends.appendChild(b);
 });
}

/* ===== CHAT ===== */
function cid(a,b){return a<b?a+"_"+b:b+"_"+a;}

async function send(){
 if(!current)return alert("Select friend");
 let id=Date.now();

 await fetch(db+"chats/"+cid(user,current)+"/"+id+".json",{
  method:"PUT",
  body:JSON.stringify({
   from:user,text:msg.value,time:id,reactions:{}
  })
 });
 msg.value="";
}

async function react(mid,emoji){
 await fetch(db+"chats/"+cid(user,current)+"/"+mid+"/reactions/"+user+".json",{
  method:"PUT",
  body:JSON.stringify(emoji)
 });
}

async function loadChat(){
 if(!current)return;

 let r=await fetch(db+"chats/"+cid(user,current)+".json");
 let d=await r.json();
 chat.innerHTML="";
 if(!d)return;

 Object.entries(d).forEach(([id,m])=>{
  let div=document.createElement("div");
  div.className="msg "+(m.from==user?"me":"other");

  div.innerHTML=m.text;

  /* reactions */
  let rdiv=document.createElement("div");
  rdiv.className="react";

  ["👍","❤️","😂"].forEach(e=>{
   let s=document.createElement("span");
   s.innerText=e;
   s.onclick=()=>react(id,e);
   rdiv.appendChild(s);
  });

  if(m.reactions){
   let list=Object.values(m.reactions).join(" ");
   let show=document.createElement("div");
   show.innerText=list;
   rdiv.appendChild(show);
  }

  div.appendChild(rdiv);
  chat.appendChild(div);

  /* notification */
  if(m.time>lastMsgTime && m.from!=user){
    notify("New message from "+m.from, m.text);
    lastMsgTime=m.time;
  }

 });

 chat.scrollTop=chat.scrollHeight;
}

/* ===== STATUS (24H + VIEWERS) ===== */
async function uploadStatus(){
 let id=Date.now();
 await fetch(db+"status/"+user+"/"+id+".json",{
  method:"PUT",
  body:JSON.stringify({
   text:statusInput.value,
   time:id,
   viewers:{}
  })
 });
 statusInput.value="";
}

async function viewStatus(u,id){
 await fetch(db+"status/"+u+"/"+id+"/viewers/"+user+".json",{method:"PUT",body:"true"});
}

async function loadStatus(){
 let r=await fetch(db+"status.json");
 let d=await r.json();
 statusList.innerHTML="";

 if(!d)return;

 Object.entries(d).forEach(([u,posts])=>{
  Object.entries(posts).forEach(([id,s])=>{
   if(Date.now()-s.time>86400000){
     fetch(db+"status/"+u+"/"+id+".json",{method:"DELETE"});
     return;
   }

   let div=document.createElement("div");
   div.innerText=u+": "+s.text;
   div.onclick=()=>viewStatus(u,id);

   if(u==user && s.viewers){
     let v=document.createElement("div");
     v.className="viewer";
     v.innerText="Seen by: "+Object.keys(s.viewers).join(",");
     div.appendChild(v);
   }

   statusList.appendChild(div);
  });
 });
}

/* ===== NOTIFICATION ===== */
function requestNotify(){
 if(Notification.permission!=="granted"){
  Notification.requestPermission();
 }
}

function notify(title,body){
 if(Notification.permission==="granted"){
  new Notification(title,{body});
 }
}

/* ===== LOGOUT ===== */
function logout(){
 setOnline(false);
 localStorage.removeItem("user");
 location.reload();
}
</script>

</body>
</html>
