<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>🔥 RedChaat Ultra Pro</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#0f0f0f;
  color:white;
}
header{
  background:#ff2e63;
  padding:12px;
  text-align:center;
  font-size:20px;
}
input,button{
  width:100%;
  padding:10px;
  margin:5px 0;
  border:none;
  border-radius:6px;
}
button{background:#ff2e63;color:white;}
.chat{
  height:50vh;
  overflow:auto;
  background:#111;
  padding:10px;
}
.msg{padding:8px;margin:5px;border-radius:8px;max-width:70%;}
.me{background:#00c853;margin-left:auto;}
.other{background:#444;}
.hidden{display:none;}
.nav{
  position:fixed;bottom:0;width:100%;display:flex;background:#222;
}
.nav button{flex:1;background:none;color:white;}
</style>

</head>

<body>

<header>🔥 RedChaat Ultra Pro</header>

<div id="auth">
<h3>Signup</h3>
<input id="sid" placeholder="User ID">
<input id="spass" type="password" placeholder="Password">
<button onclick="signup()">Signup</button>

<h3>Login</h3>
<input id="lid" placeholder="User ID">
<input id="lpass" type="password">
<button onclick="login()">Login</button>
</div>

<div id="app" class="hidden">

<h3 id="me"></h3>

<div id="friends"></div>

<div class="chat" id="chat"></div>

<input id="msg" placeholder="Message">
<button onclick="send()">Send</button>
<button onclick="sendImage()">📷 Image</button>
<button onclick="voice()">🎤</button>
<button onclick="eye()">👁️ One Time</button>

</div>

<div class="nav hidden" id="nav">
<button onclick="logout()">Logout</button>
</div>

<script>
const db="https://redchaat-ffad2-default-rtdb.firebaseio.com/";

let user=localStorage.getItem("user");
let current=null;
let oneTime=false;

/* AUTH */
async function signup(){
  let id=sid.value, pass=spass.value;
  if(!id||!pass)return alert("Fill");

  let res=await fetch(db+"users/"+id+".json");
  if(await res.json())return alert("Exists");

  await fetch(db+"users/"+id+".json",{
    method:"PUT",
    body:JSON.stringify({password:pass,friends:{}})
  });
  alert("Done");
}

async function login(){
  let id=lid.value, pass=lpass.value;
  let res=await fetch(db+"users/"+id+".json");
  let d=await res.json();
  if(!d)return alert("No user");
  if(d.password!=pass)return alert("Wrong");

  localStorage.setItem("user",id);
  location.reload();
}

/* INIT */
if(user){
  auth.classList.add("hidden");
  app.classList.remove("hidden");
  nav.classList.remove("hidden");
  me.innerText="You: "+user;
  loadFriends();
  setInterval(loadChat,2000);
}

/* FRIEND SYSTEM */
async function loadFriends(){
  let res=await fetch(db+"users/"+user+"/friends.json");
  let d=await res.json();
  friends.innerHTML="";

  let add=document.createElement("input");
  add.placeholder="Add friend ID";
  add.onchange=async()=>{
    let f=add.value;
    await fetch(db+"users/"+user+"/friends/"+f+".json",{method:"PUT",body:"true"});
    await fetch(db+"users/"+f+"/friends/"+user+".json",{method:"PUT",body:"true"});
    loadFriends();
  };
  friends.appendChild(add);

  if(!d)return;

  Object.keys(d).forEach(f=>{
    let b=document.createElement("button");
    b.innerText=f;
    b.onclick=()=>{current=f;};
    friends.appendChild(b);
  });
}

/* CHAT ID */
function cid(a,b){
  return a<b?a+"_"+b:b+"_"+a;
}

/* SEND */
async function send(){
  if(!current)return alert("Select friend");
  let id=Date.now();

  await fetch(db+"chats/"+cid(user,current)+"/"+id+".json",{
    method:"PUT",
    body:JSON.stringify({
      from:user,
      text:msg.value,
      one:oneTime,
      time:Date.now()
    })
  });

  msg.value="";
  oneTime=false;
}

/* IMAGE */
async function sendImage(){
  let file=document.createElement("input");
  file.type="file";
  file.onchange=()=>{
    let reader=new FileReader();
    reader.onload=async ()=>{
      await fetch(db+"chats/"+cid(user,current)+"/"+Date.now()+".json",{
        method:"PUT",
        body:JSON.stringify({
          from:user,
          img:reader.result
        })
      });
    };
    reader.readAsDataURL(file.files[0]);
  };
  file.click();
}

/* LOAD CHAT */
async function loadChat(){
  if(!current)return;

  let res=await fetch(db+"chats/"+cid(user,current)+".json");
  let d=await res.json();

  chat.innerHTML="";

  if(!d)return;

  Object.entries(d).forEach(([id,m])=>{

    /* disappearing */
    if(m.one && Date.now()-m.time>15000){
      fetch(db+"chats/"+cid(user,current)+"/"+id+".json",{method:"DELETE"});
      return;
    }

    let div=document.createElement("div");
    div.className="msg "+(m.from==user?"me":"other");

    if(m.img){
      let img=document.createElement("img");
      img.src=m.img;
      img.style.width="100%";
      div.appendChild(img);
    }else{
      div.innerText=m.text;
    }

    chat.appendChild(div);
  });

  chat.scrollTop=chat.scrollHeight;
}

/* ONE TIME */
function eye(){
  oneTime=true;
  alert("One-time message ON");
}

/* VOICE */
function voice(){
  let rec=new webkitSpeechRecognition();
  rec.lang="en-IN";
  rec.start();
  rec.onresult=e=>{
    msg.value=e.results[0][0].transcript;
  };
}

/* LOGOUT */
function logout(){
  localStorage.removeItem("user");
  location.reload();
}
</script>

</body>
</html>
