<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RedChat - Secure Messaging</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #f0f2f5; height: 100vh; display: flex; justify-content: center; align-items: center; }
        
        /* App Container */
        #app-container { width: 100%; max-width: 800px; height: 100vh; background: white; display: none; flex-direction: column; box-shadow: 0 0 20px rgba(0,0,0,0.1); }
        @media(min-width: 800px) { #app-container { height: 90vh; border-radius: 15px; overflow: hidden; } }
        
        /* Auth Screens */
        .auth-box { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); width: 90%; max-width: 400px; text-align: center; }
        .auth-box h2 { color: #ec4899; margin-bottom: 20px; font-size: 28px; }
        .auth-box input, .auth-box select { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #cbd5e1; border-radius: 8px; outline: none; }
        .auth-box button { width: 100%; padding: 12px; background: #ec4899; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 16px; }
        .auth-box .link { color: #3b82f6; font-size: 13px; cursor: pointer; margin-top: 15px; display: inline-block; }

        /* Header & Nav */
        .header { background: #be185d; color: white; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; }
        .nav-tabs { display: flex; background: #9d174d; }
        .nav-tabs div { flex: 1; text-align: center; padding: 12px; color: #fbcfe8; cursor: pointer; font-weight: bold; border-bottom: 3px solid transparent; }
        .nav-tabs .active { color: white; border-bottom: 3px solid white; }

        /* Content Area */
        .content-area { flex: 1; overflow-y: auto; background: #fdf2f8; position: relative; }
        
        /* Chat View */
        .chat-list-item { padding: 15px; border-bottom: 1px solid #fce7f3; display: flex; align-items: center; gap: 15px; cursor: pointer; background: white; }
        .chat-list-item:hover { background: #fdf2f8; }
        .avatar { width: 45px; height: 45px; background: #ec4899; color: white; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 20px; font-weight: bold; }
        
        /* Active Chat Room */
        #chat-room { display: none; flex-direction: column; height: 100%; background: #e5e5f7; background-image: radial-gradient(#cbd5e1 1px, transparent 1px); background-size: 20px 20px; }
        .chat-header { background: #be185d; color: white; padding: 15px; display: flex; align-items: center; gap: 15px; }
        .back-btn { background: none; border: none; color: white; font-size: 20px; cursor: pointer; }
        #message-area { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .msg { max-width: 75%; padding: 10px 15px; border-radius: 15px; font-size: 14px; position: relative; word-wrap: break-word; }
        .msg.sent { background: #ec4899; color: white; align-self: flex-end; border-bottom-right-radius: 2px; }
        .msg.received { background: white; color: black; align-self: flex-start; border-bottom-left-radius: 2px; border: 1px solid #cbd5e1; }
        .msg-time { font-size: 10px; opacity: 0.7; margin-top: 5px; text-align: right; display: block; }
        .del-btn { position: absolute; top: -10px; right: -10px; background: #ef4444; color: white; border: none; border-radius: 50%; width: 20px; height: 20px; font-size: 10px; cursor: pointer; display: none; }
        .msg.sent:hover .del-btn { display: block; }

        /* One Time Message */
        .one-time-box { background: #1e293b; color: #facc15; border: 1px dashed #facc15; cursor: pointer; text-align: center; }

        /* Input Area */
        .chat-input { background: white; padding: 10px; display: flex; gap: 10px; align-items: center; }
        .chat-input input[type="text"] { flex: 1; padding: 12px; border-radius: 25px; border: 1px solid #cbd5e1; outline: none; }
        .btn-send { background: #ec4899; color: white; border: none; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; font-size: 18px; }
        .btn-attach { background: none; border: none; font-size: 22px; cursor: pointer; color: #64748b; }
        .onetime-toggle { font-size: 20px; cursor: pointer; opacity: 0.5; }
        .onetime-toggle.active { opacity: 1; text-shadow: 0 0 5px #facc15; }
    </style>
</head>
<body>

    <div id="auth-screen" class="auth-box">
        <h2>RedChat</h2>
        <div id="login-form">
            <input type="text" id="login-id" placeholder="আপনার চ্যাট ID দিন">
            <input type="password" id="login-pass" placeholder="পাসওয়ার্ড">
            <button onclick="login()">লগইন করুন</button>
            <span class="link" onclick="toggleAuth('register')">নতুন অ্যাকাউন্ট তৈরি করুন</span><br>
            <span class="link" style="color:gray;" onclick="toggleAuth('forgot')">পাসওয়ার্ড ভুলে গেছেন?</span>
        </div>

        <div id="register-form" style="display: none;">
            <input type="text" id="reg-id" placeholder="একটি নতুন চ্যাট ID বানান (e.g. rahul123)">
            <input type="text" id="reg-name" placeholder="আপনার নাম">
            <input type="password" id="reg-pass" placeholder="পাসওয়ার্ড সেট করুন">
            <select id="reg-q">
                <option value="1">আপনার ছোটবেলার ডাকনাম কী?</option>
                <option value="2">আপনার প্রিয় শিক্ষকের নাম কী?</option>
                <option value="3">আপনার প্রথম পোষা প্রাণীর নাম?</option>
            </select>
            <input type="text" id="reg-ans" placeholder="প্রশ্নের উত্তর (রিকভারির জন্য)">
            <button onclick="register()">অ্যাকাউন্ট খুলুন</button>
            <span class="link" onclick="toggleAuth('login')">আগের অ্যাকাউন্টে লগইন করুন</span>
        </div>

        <div id="forgot-form" style="display: none;">
            <input type="text" id="forgot-id" placeholder="আপনার চ্যাট ID দিন">
            <button onclick="checkSecurityQuestion()" style="margin-bottom:10px;">অ্যাকাউন্ট খুঁজুন</button>
            <div id="recovery-area" style="display: none;">
                <p id="rec-q-text" style="font-size:13px; color:#be185d; margin-bottom:10px;"></p>
                <input type="text" id="rec-ans" placeholder="উত্তর দিন">
                <input type="password" id="new-pass" placeholder="নতুন পাসওয়ার্ড">
                <button onclick="resetPassword()">পাসওয়ার্ড পরিবর্তন করুন</button>
            </div>
            <span class="link" onclick="toggleAuth('login')">লগইনে ফিরে যান</span>
        </div>
    </div>

    <div id="app-container">
        <div class="header">
            <h3 style="margin:0;">RedChat</h3>
            <span id="user-name-display" style="font-size:14px; font-weight:bold;"></span>
        </div>
        
        <div class="nav-tabs" id="main-nav">
            <div class="active" onclick="switchTab('chats')">চ্যাটস</div>
            <div onclick="switchTab('status')">স্ট্যাটাস</div>
            <div onclick="switchTab('friends')">ফ্রেন্ডস</div>
        </div>

        <div id="tab-chats" class="content-area"></div>

        <div id="tab-status" class="content-area" style="display: none; padding: 20px; text-align: center;">
            <h3>স্ট্যাটাস ও স্টোরি</h3>
            <p style="color:gray; font-size:13px; margin-top:10px;">প্রাইভেট স্ট্যাটাস দেওয়ার সুবিধা খুব শীঘ্রই আসছে!</p>
        </div>

        <div id="tab-friends" class="content-area" style="display: none; padding: 20px;">
            <div style="display: flex; gap: 10px; margin-bottom: 20px;">
                <input type="text" id="add-friend-id" placeholder="বন্ধুর ID দিয়ে খুঁজুন" style="flex:1; padding:10px; border-radius:8px; border:1px solid #cbd5e1;">
                <button onclick="sendFriendReq()" style="background:#be185d; color:white; border:none; padding:10px 15px; border-radius:8px; font-weight:bold;">অ্যাড</button>
            </div>
            <div id="friend-requests-box"></div>
            <h4 style="margin-top:20px; color:#be185d;">আপনার বন্ধুরা</h4>
            <div id="friends-list-box" style="margin-top:10px;"></div>
        </div>

        <div id="chat-room">
            <div class="chat-header">
                <button class="back-btn" onclick="closeChat()">⬅</button>
                <div class="avatar" id="chat-avatar"></div>
                <h3 id="chat-title" style="margin:0;">Name</h3>
            </div>
            
            <div id="message-area"></div>
            
            <div class="chat-input">
                <input type="file" id="img-upload" accept="image/*" style="display:none;" onchange="sendImage(event)">
                <button class="btn-attach" onclick="document.getElementById('img-upload').click()">📎</button>
                <span id="onetime-btn" class="onetime-toggle" onclick="toggleOneTime()" title="One-Time Message">💣</span>
                <input type="text" id="msg-input" placeholder="মেসেজ লিখুন..." onkeypress="if(event.key === 'Enter') sendMsg()">
                <button class="btn-send" onclick="sendMsg()">➤</button>
            </div>
        </div>
    </div>

<script>
// ================= FIREBASE API (Using your DB) =================
const DB_URL = "https://radica-super-app-18cb3-default-rtdb.firebaseio.com/redchat";
let currentUser = null;
let currentChatFriendId = null;
let currentChatFriendName = null;
let isOneTimeMode = false;
let chatSyncInterval = null;

// ================= AUTHENTICATION =================
function toggleAuth(type) {
    document.getElementById('login-form').style.display = type === 'login' ? 'block' : 'none';
    document.getElementById('register-form').style.display = type === 'register' ? 'block' : 'none';
    document.getElementById('forgot-form').style.display = type === 'forgot' ? 'block' : 'none';
}

async function register() {
    let id = document.getElementById('reg-id').value.trim();
    let name = document.getElementById('reg-name').value.trim();
    let pass = document.getElementById('reg-pass').value;
    let q = document.getElementById('reg-q').options[document.getElementById('reg-q').selectedIndex].text;
    let ans = document.getElementById('reg-ans').value.trim();

    if(!id || !name || !pass || !ans) return alert("সব তথ্য পূরণ করুন!");

    const res = await fetch(`${DB_URL}/users/${id}.json`);
    if(await res.json()) return alert("এই ID টি আগে থেকেই ব্যবহার করা হচ্ছে। অন্য ID দিন।");

    let userData = { name, pass, secQ: q, secAns: ans, friends: {} };
    await fetch(`${DB_URL}/users/${id}.json`, { method: 'PUT', body: JSON.stringify(userData) });
    alert("✅ অ্যাকাউন্ট তৈরি হয়েছে! এবার লগইন করুন।");
    toggleAuth('login');
}

async function login() {
    let id = document.getElementById('login-id').value.trim();
    let pass = document.getElementById('login-pass').value;
    if(!id || !pass) return alert("ID এবং পাসওয়ার্ড দিন!");

    const res = await fetch(`${DB_URL}/users/${id}.json`);
    const data = await res.json();

    if(!data || data.pass !== pass) return alert("❌ ID বা পাসওয়ার্ড ভুল!");
    
    currentUser = { id, name: data.name };
    document.getElementById('auth-screen').style.display = 'none';
    document.getElementById('app-container').style.display = 'flex';
    document.getElementById('user-name-display').innerText = data.name;
    loadFriendsAndChats();
}

// Password Recovery
let recTargetId = null;
async function checkSecurityQuestion() {
    let id = document.getElementById('forgot-id').value.trim();
    const res = await fetch(`${DB_URL}/users/${id}.json`);
    const data = await res.json();
    if(!data) return alert("এই ID পাওয়া যায়নি!");
    recTargetId = id;
    document.getElementById('rec-q-text').innerText = "প্রশ্ন: " + data.secQ;
    document.getElementById('recovery-area').style.display = 'block';
}

async function resetPassword() {
    let ans = document.getElementById('rec-ans').value.trim();
    let newPass = document.getElementById('new-pass').value;
    const res = await fetch(`${DB_URL}/users/${recTargetId}.json`);
    const data = await res.json();

    if(data.secAns.toLowerCase() !== ans.toLowerCase()) return alert("❌ উত্তর ভুল হয়েছে!");
    
    await fetch(`${DB_URL}/users/${recTargetId}/pass.json`, { method: 'PUT', body: JSON.stringify(newPass) });
    alert("✅ পাসওয়ার্ড পরিবর্তন হয়েছে! লগইন করুন।");
    toggleAuth('login');
}

// ================= NAVIGATION & FRIENDS =================
function switchTab(tab) {
    document.getElementById('tab-chats').style.display = tab === 'chats' ? 'block' : 'none';
    document.getElementById('tab-status').style.display = tab === 'status' ? 'block' : 'none';
    document.getElementById('tab-friends').style.display = tab === 'friends' ? 'block' : 'none';
    
    document.querySelectorAll('.nav-tabs div').forEach(el => el.classList.remove('active'));
    event.target.classList.add('active');
    
    if(tab === 'friends') loadFriendsAndChats();
}

async function sendFriendReq() {
    let fId = document.getElementById('add-friend-id').value.trim();
    if(!fId || fId === currentUser.id) return alert("সঠিক ID দিন!");
    
    const res = await fetch(`${DB_URL}/users/${fId}.json`);
    const data = await res.json();
    if(!data) return alert("এই ID-র কেউ নেই!");

    await fetch(`${DB_URL}/users/${fId}/requests/${currentUser.id}.json`, { method: 'PUT', body: JSON.stringify(currentUser.name) });
    alert("✅ ফ্রেন্ড রিকোয়েস্ট পাঠানো হয়েছে!");
    document.getElementById('add-friend-id').value = '';
}

async function acceptReq(fId, fName) {
    await fetch(`${DB_URL}/users/${currentUser.id}/friends/${fId}.json`, { method: 'PUT', body: JSON.stringify(fName) });
    await fetch(`${DB_URL}/users/${fId}/friends/${currentUser.id}.json`, { method: 'PUT', body: JSON.stringify(currentUser.name) });
    await fetch(`${DB_URL}/users/${currentUser.id}/requests/${fId}.json`, { method: 'DELETE' });
    loadFriendsAndChats();
}

async function loadFriendsAndChats() {
    const res = await fetch(`${DB_URL}/users/${currentUser.id}.json`);
    const data = await res.json();
    
    // Load Requests
    let reqHtml = '';
    if(data.requests) {
        Object.entries(data.requests).forEach(([id, name]) => {
            reqHtml += `<div style="background:#fce7f3; padding:10px; margin-bottom:5px; border-radius:8px; display:flex; justify-content:space-between;"><b>${name}</b> <button onclick="acceptReq('${id}','${name}')" style="background:#be185d; color:white; border:none; padding:5px; border-radius:5px;">Accept</button></div>`;
        });
    }
    document.getElementById('friend-requests-box').innerHTML = reqHtml;

    // Load Friends & Chats List
    let frHtml = ''; let chatHtml = '';
    if(data.friends) {
        Object.entries(data.friends).forEach(([id, name]) => {
            frHtml += `<div style="padding:10px; border-bottom:1px solid #ddd;">👤 ${name} (${id})</div>`;
            chatHtml += `
            <div class="chat-list-item" onclick="openChat('${id}', '${name}')">
                <div class="avatar">${name.charAt(0)}</div>
                <div><b>${name}</b><br><small style="color:gray;">চ্যাট করতে ক্লিক করুন</small></div>
            </div>`;
        });
    } else {
        chatHtml = `<p style="text-align:center; padding:20px; color:gray;">কোনো ফ্রেন্ড নেই। ফ্রেন্ড অ্যাড করুন।</p>`;
    }
    document.getElementById('friends-list-box').innerHTML = frHtml;
    document.getElementById('tab-chats').innerHTML = chatHtml;
}

// ================= CHATTING SYSTEM =================
function getChatId(id1, id2) { return id1 < id2 ? `${id1}_${id2}` : `${id2}_${id1}`; }

function openChat(fId, fName) {
    currentChatFriendId = fId;
    currentChatFriendName = fName;
    document.getElementById('main-nav').style.display = 'none';
    document.querySelectorAll('.content-area').forEach(el => el.style.display = 'none');
    document.getElementById('chat-room').style.display = 'flex';
    document.getElementById('chat-title').innerText = fName;
    document.getElementById('chat-avatar').innerText = fName.charAt(0);
    
    if(chatSyncInterval) clearInterval(chatSyncInterval);
    loadMessages();
    chatSyncInterval = setInterval(loadMessages, 3000); // Auto Refresh Chat
}

function closeChat() {
    document.getElementById('chat-room').style.display = 'none';
    document.getElementById('main-nav').style.display = 'flex';
    document.getElementById('tab-chats').style.display = 'block';
    if(chatSyncInterval) clearInterval(chatSyncInterval);
}

function toggleOneTime() {
    isOneTimeMode = !isOneTimeMode;
    document.getElementById('onetime-btn').className = isOneTimeMode ? 'onetime-toggle active' : 'onetime-toggle';
    if(isOneTimeMode) alert("💣 ওয়ান-টাইম মোড চালু! মেসেজ বা ছবি একবার দেখলেই গায়েব হয়ে যাবে।");
}

async function sendMsg(imgBase64 = null) {
    let text = document.getElementById('msg-input').value.trim();
    if(!text && !imgBase64) return;

    let chatId = getChatId(currentUser.id, currentChatFriendId);
    let msgId = "msg_" + Date.now();
    let msgData = {
        sender: currentUser.id,
        text: text,
        img: imgBase64,
        type: isOneTimeMode ? 'onetime' : 'normal',
        time: Date.now(),
        viewed: false
    };

    await fetch(`${DB_URL}/chats/${chatId}/${msgId}.json`, { method: 'PUT', body: JSON.stringify(msgData) });
    document.getElementById('msg-input').value = '';
    
    isOneTimeMode = false; // Reset One time mode
    document.getElementById('onetime-btn').className = 'onetime-toggle';
    loadMessages();
}

function sendImage(event) {
    let file = event.target.files[0];
    if(!file) return;
    let reader = new FileReader();
    reader.onload = function(e) {
        let img = new Image();
        img.onload = function() {
            let canvas = document.createElement('canvas');
            let scale = 400 / img.width;
            canvas.width = 400; canvas.height = img.height * scale;
            canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
            sendMsg(canvas.toDataURL('image/jpeg', 0.6));
        }
        img.src = e.target.result;
    }
    reader.readAsDataURL(file);
}

async function loadMessages() {
    let chatId = getChatId(currentUser.id, currentChatFriendId);
    const res = await fetch(`${DB_URL}/chats/${chatId}.json`);
    const msgs = await res.json();
    
    let msgArea = document.getElementById('message-area');
    msgArea.innerHTML = '';
    
    if(!msgs) return;

    let now = Date.now();

    Object.entries(msgs).forEach(([msgId, m]) => {
        let isMe = m.sender === currentUser.id;
        let timeStr = new Date(m.time).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
        
        // 15 Min Delete Logic
        let canDelete = isMe && (now - m.time <= 15 * 60 * 1000);
        let delBtnHtml = canDelete ? `<button class="del-btn" onclick="deleteMsg('${msgId}')">✖</button>` : '';

        // One-Time Logic
        if(m.type === 'onetime') {
            if(isMe) {
                // Sender sees what they sent
                msgArea.innerHTML += `
                <div class="msg sent">
                    ${delBtnHtml}
                    <i>💣 [ওয়ান-টাইম পাঠানো হয়েছে]</i><br>
                    ${m.img ? `<img src="${m.img}" style="width:100%; border-radius:10px; margin-top:5px;">` : m.text}
                    <span class="msg-time">${timeStr}</span>
                </div>`;
            } else {
                // Receiver Logic
                if(m.viewed) {
                    msgArea.innerHTML += `<div class="msg received" style="color:gray; font-style:italic;">💣 ওয়ান-টাইম মেসেজটি দেখা হয়ে গেছে।</div>`;
                } else {
                    msgArea.innerHTML += `<div class="msg received" style="color:gray; font-style:italic;">💣 ওয়ান-টাইম মেসেজটি দেখা হয়ে গেছে।</div>`;
                } else {
                    msgArea.innerHTML += `
                    <div class="msg received one-time-box" onclick="viewOneTime('${msgId}', this, '${m.text}', '${m.img}')">
                        💣 একটি ওয়ান-টাইম মেসেজ এসেছে। দেখতে এখানে ক্লিক করুন।
                    </div>`;
                }
            }
        } 
        // Normal Message
        else {
            let contentHtml = m.img ? `<img src="${m.img}" style="width:100%; border-radius:10px; margin-bottom:5px;"><br>${m.text}` : m.text;
            msgArea.innerHTML += `
            <div class="msg ${isMe ? 'sent' : 'received'}">
                ${delBtnHtml}
                ${contentHtml}
                <span class="msg-time">${timeStr}</span>
            </div>`;
        }
    });
    msgArea.scrollTop = msgArea.scrollHeight;
}

async function viewOneTime(msgId, el, text, img) {
    let contentHtml = img !== 'undefined' && img !== 'null' ? `<img src="${img}" style="width:100%; border-radius:10px;"><br>${text}` : text;
    el.innerHTML = contentHtml + `<br><small style="color:red;">(এটি ব্যাক করলেই মুছে যাবে)</small>`;
    el.style.background = 'white'; el.style.color = 'black'; el.style.border = '1px solid #cbd5e1';
    el.onclick = null; // Disable future clicks

    // Update DB so it can't be viewed again
    let chatId = getChatId(currentUser.id, currentChatFriendId);
    await fetch(`${DB_URL}/chats/${chatId}/${msgId}/viewed.json`, { method: 'PUT', body: true });
}

async function deleteMsg(msgId) {
    if(confirm("মেসেজটি ডিলিট করতে চান? (For Everyone)")) {
        let chatId = getChatId(currentUser.id, currentChatFriendId);
        await fetch(`${DB_URL}/chats/${chatId}/${msgId}.json`, { method: 'DELETE' });
        loadMessages();
    }
}
</script>
