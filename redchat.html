<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>RedChaat v9</title>

<style>
:root{
  --primary:#00bcd4;
  --accent:#ffd54f;
  --bg:#e0f7fa;
  --card:#ffffff;
}
body{margin:0;font-family:sans-serif;background:var(--bg);}

/* HEADER */
header{
  background:var(--primary);
  color:#fff;
  padding:12px;
  text-align:center;
}

/* SCREEN */
.screen{display:none;padding:10px;}
.active{display:block;}

/* CHAT LIST */
.chatItem{
  background:var(--card);
  padding:12px;
  border-radius:10px;
  margin-bottom:8px;
  cursor:pointer;
}

/* CHAT BOX */
.chatBox{
  height:55vh;
  overflow:auto;
  background:var(--card);
  padding:10px;
  border-radius:10px;
}

/* MESSAGE */
.msg{
  padding:10px;
  margin:6px;
  border-radius:12px;
  max-width:70%;
}
.me{background:var(--accent);margin-left:auto;}
.other{background:#ddd;}

/* IMAGE */
.chatImg{width:100%;border-radius:10px;margin-top:5px;}

/* NAV */
.nav{
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
  background:var(--primary);
}
.nav button{
  flex:1;
  background:none;
  color:#fff;
  border:none;
  padding:10px;
}

/* INPUT */
input,button{
  width:100%;
  padding:10px;
  margin:5px 0;
  border:none;
  border-radius:8px;
}
button{
  background:var(--primary);
  color:#fff;
}
</style>

</head>

<body>

<header>RedChaat v9</header>

<!-- AUTH -->
<div id="auth" class="screen active">
<input id="lid" placeholder="User ID">
<input id="lpass" placeholder="Password">
<button onclick="login()">Login</button>

<input id="sid" placeholder="New ID">
<input id="spass" placeholder="Password">
<button onclick="signup()">Signup</button>
</div>

<!-- CHATS -->
<div id="chats" class="screen">
<button onclick="addFriend()">➕ Add Friend</button>
<div id="chatList"></div>
</div>

<!-- CHAT WINDOW -->
<div id="chatWindow" class="screen">
<button onclick="back()">⬅ Back</button>
<h3 id="chatName"></h3>

<div class="chatBox" id="chatBox"></div>

<input id="msg" placeholder="Message">
<button onclick="send()">Send</button>
<button onclick="sendImage()">📷 Image</button>
<button onclick="recordVoice()">🎤 Voice</button>
</div>

<!-- STATUS -->
<div id="status" class="screen">
<input id="statusText" placeholder="Write status">
<button onclick="addStatus()">Post Text</button>
<button onclick="addPhotoStatus()">📷 Photo</button>
<div id="statusList"></div>
</div>

<div class="nav hidden" id="nav">
<button onclick="show('chats')">Chats</button>
<button onclick="show('status')">Status</button>
</div>

<script>
const db="https://redchaat-ffad2-default-rtdb.firebaseio.com/";
let user=localStorage.getItem("user");
let current=null;

/* AUTH */
async function signup(){
 await fetch(db+"users/"+sid.value+".json",{
  method:"PUT",
  body:JSON.stringify({password:spass.value,friends:{}})
 });
 alert("Signup done");
}

async function login(){
 let r=await fetch(db+"users/"+lid.value+".json");
 let d=await r.json();
 if(!d||d.password!=lpass.value)return alert("Error");
 localStorage.setItem("user",lid.value);
 location.reload();
}

/* INIT */
if(user){
 auth.classList.remove("active");
 nav.classList.remove("hidden");
 show("chats");
 loadChats();
 setInterval(loadChats,3000);
}

/* NAV */
function show(s){
 document.querySelectorAll(".screen").forEach(e=>e.classList.remove("active"));
 document.getElementById(s).classList.add("active");
}

/* FRIEND */
async function addFriend(){
 let f=prompt("Enter Friend ID");

 let check=await fetch(db+"users/"+f+".json");
 if(!await check.json()) return alert("User not found");

 await fetch(db+"users/"+user+"/friends/"+f+".json",{method:"PUT",body:"true"});
 await fetch(db+"users/"+f+"/friends/"+user+".json",{method:"PUT",body:"true"});

 loadChats();
}

/* CHAT LIST */
async function loadChats(){
 let r=await fetch(db+"users/"+user+"/friends.json");
 let d=await r.json();
 chatList.innerHTML="";

 if(!d) return;

 Object.keys(d).forEach(f=>{
  let div=document.createElement("div");
  div.className="chatItem";
  div.innerText=f;
  div.onclick=()=>openChat(f);
  chatList.appendChild(div);
 });
}

/* CHAT */
function cid(a,b){return a<b?a+"_"+b:b+"_"+a;}

function openChat(f){
 current=f;
 chatName.innerText=f;
 show("chatWindow");
 loadChat();

 setInterval(()=>{
  if(current) loadChat();
 },2000);
}

async function send(){
 let id=Date.now();
 await fetch(db+"chats/"+cid(user,current)+"/"+id+".json",{
  method:"PUT",
  body:JSON.stringify({from:user,text:msg.value,time:id})
 });
 msg.value="";
}

/* IMAGE */
function sendImage(){
 let i=document.createElement("input");
 i.type="file";
 i.onchange=()=>{
  let r=new FileReader();
  r.onload=()=>{
    fetch(db+"chats/"+cid(user,current)+"/"+Date.now()+".json",{
      method:"PUT",
      body:JSON.stringify({from:user,img:r.result})
    });
  };
  r.readAsDataURL(i.files[0]);
 };
 i.click();
}

/* VOICE */
function recordVoice(){
 navigator.mediaDevices.getUserMedia({audio:true}).then(stream=>{
  let rec=new MediaRecorder(stream);
  let chunks=[];

  rec.ondataavailable=e=>chunks.push(e.data);

  rec.onstop=()=>{
    let blob=new Blob(chunks);
    let reader=new FileReader();
    reader.onload=()=>{
      fetch(db+"chats/"+cid(user,current)+"/"+Date.now()+".json",{
        method:"PUT",
        body:JSON.stringify({from:user,audio:reader.result})
      });
    };
    reader.readAsDataURL(blob);
  };

  rec.start();
  setTimeout(()=>rec.stop(),3000);
 });
}

/* LOAD CHAT */
async function loadChat(){
 let r=await fetch(db+"chats/"+cid(user,current)+".json");
 let d=await r.json();
 chatBox.innerHTML="";

 if(!d) return;

 Object.values(d).forEach(m=>{
  let div=document.createElement("div");
  div.className="msg "+(m.from==user?"me":"other");

  if(m.text) div.innerText=m.text;

  if(m.img){
    let img=document.createElement("img");
    img.src=m.img;
    img.className="chatImg";
    div.appendChild(img);
  }

  if(m.audio){
    let a=document.createElement("audio");
    a.controls=true;
    a.src=m.audio;
    div.appendChild(a);
  }

  chatBox.appendChild(div);
 });

 chatBox.scrollTop=chatBox.scrollHeight;
}

/* STATUS */
async function addStatus(){
 await fetch(db+"status/"+user+"/"+Date.now()+".json",{
  method:"PUT",
  body:JSON.stringify({text:statusText.value,time:Date.now(),view:{}})
 });
 loadStatus();
}

function addPhotoStatus(){
 let i=document.createElement("input");
 i.type="file";
 i.onchange=()=>{
  let r=new FileReader();
  r.onload=()=>{
    fetch(db+"status/"+user+"/"+Date.now()+".json",{
      method:"PUT",
      body:JSON.stringify({img:r.result,time:Date.now(),view:{}})
    });
    loadStatus();
  };
  r.readAsDataURL(i.files[0]);
 };
 i.click();
}

async function loadStatus(){
 let r=await fetch(db+"status.json");
 let d=await r.json();
 statusList.innerHTML="";

 if(!d) return;

 Object.entries(d).forEach(([u,s])=>{
  Object.entries(s).forEach(([id,st])=>{
    if(Date.now()-st.time>86400000) return;

    let div=document.createElement("div");

    if(st.text) div.innerText=u+": "+st.text;

    if(st.img){
      let img=document.createElement("img");
      img.src=st.img;
      img.style.width="100%";
      div.appendChild(img);
    }

    div.onclick=()=>{
      fetch(db+"status/"+u+"/"+id+"/view/"+user+".json",{method:"PUT",body:"true"});
    };

    statusList.appendChild(div);
  });
 });
}

/* BACK */
function back(){show("chats");}
</script>

</body>
</html>
