<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>RedChaat v5</title>

<style>
body{margin:0;font-family:sans-serif;background:#111;color:#fff;}
header{background:#ff2e63;padding:12px;text-align:center;font-size:20px;}
.screen{display:none;padding:10px;}
.active{display:block;}

.chatItem{
  padding:10px;
  border-bottom:1px solid #333;
  cursor:pointer;
}

.chatBox{
  height:60vh;
  overflow:auto;
  background:#1a1a1a;
  padding:10px;
}

.msg{padding:8px;margin:5px;border-radius:8px;max-width:70%;}
.me{background:#00c853;margin-left:auto;}
.other{background:#444;}

.bottom{
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
  background:#222;
}
.bottom button{
  flex:1;
  background:none;
  color:#fff;
  border:none;
  padding:10px;
}
.hidden{display:none;}
</style>
</head>

<body>

<header>🔥 RedChaat</header>

<!-- LOGIN -->
<div id="auth" class="screen active">
<h3>Login</h3>
<input id="lid" placeholder="User ID">
<input id="lpass" placeholder="Password">
<button onclick="login()">Login</button>

<h3>Signup</h3>
<input id="sid" placeholder="User ID">
<input id="spass" placeholder="Password">
<button onclick="signup()">Signup</button>
</div>

<!-- CHATS -->
<div id="chats" class="screen">
<h3>Chats</h3>
<div id="chatList"></div>
</div>

<!-- STATUS -->
<div id="status" class="screen">
<h3>Status</h3>
<input id="statusText" placeholder="Write status">
<button onclick="addStatus()">Post</button>
<div id="statusList"></div>
</div>

<!-- PEOPLE -->
<div id="people" class="screen">
<h3>People</h3>
<input id="fid" placeholder="Add Friend ID">
<button onclick="addFriend()">Add</button>
<div id="friendList"></div>
</div>

<!-- PROFILE -->
<div id="profile" class="screen">
<h3>Profile</h3>
<p id="myId"></p>
<button onclick="logout()">Logout</button>
</div>

<!-- CHAT WINDOW -->
<div id="chatWindow" class="screen">
<button onclick="back()">⬅ Back</button>
<h3 id="chatName"></h3>
<p id="lastSeen"></p>

<div class="chatBox" id="chatBox"></div>

<input id="msg" placeholder="Message">
<button onclick="send()">Send</button>
</div>

<!-- NAV -->
<div class="bottom hidden" id="nav">
<button onclick="show('chats')">Chats</button>
<button onclick="show('status')">Status</button>
<button onclick="show('people')">People</button>
<button onclick="show('profile')">Profile</button>
</div>

<script>
const db="https://redchaat-ffad2-default-rtdb.firebaseio.com/";
let user=localStorage.getItem("user");
let current=null;

/* AUTH */
async function signup(){
 let id=sid.value, pass=spass.value;
 let r=await fetch(db+"users/"+id+".json");
 if(await r.json())return alert("Exists");

 await fetch(db+"users/"+id+".json",{
  method:"PUT",
  body:JSON.stringify({password:pass,friends:{},online:true,lastSeen:Date.now()})
 });
 alert("Done");
}

async function login(){
 let id=lid.value, pass=lpass.value;
 let r=await fetch(db+"users/"+id+".json");
 let d=await r.json();
 if(!d)return alert("No user");
 if(d.password!=pass)return alert("Wrong");

 localStorage.setItem("user",id);
 location.reload();
}

/* INIT */
if(user){
 auth.classList.remove("active");
 nav.classList.remove("hidden");
 show("chats");
 loadChats();
}

/* NAV */
function show(s){
 document.querySelectorAll(".screen").forEach(e=>e.classList.remove("active"));
 document.getElementById(s).classList.add("active");
}

/* FRIENDS */
async function addFriend(){
 let f=fid.value;
 await fetch(db+"users/"+user+"/friends/"+f+".json",{method:"PUT",body:"true"});
 await fetch(db+"users/"+f+"/friends/"+user+".json",{method:"PUT",body:"true"});
 loadChats();
}

/* CHAT LIST */
async function loadChats(){
 let r=await fetch(db+"users/"+user+"/friends.json");
 let d=await r.json();
 chatList.innerHTML="";

 if(!d)return;

 Object.keys(d).forEach(f=>{
  let div=document.createElement("div");
  div.className="chatItem";
  div.innerText=f;
  div.onclick=()=>openChat(f);
  chatList.appendChild(div);
 });
}

/* OPEN CHAT */
function openChat(f){
 current=f;
 chatName.innerText=f;
 show("chatWindow");
 loadChat();
 setInterval(loadChat,2000);
}

/* CHAT ID */
function cid(a,b){return a<b?a+"_"+b:b+"_"+a;}

/* SEND */
async function send(){
 let id=Date.now();
 await fetch(db+"chats/"+cid(user,current)+"/"+id+".json",{
  method:"PUT",
  body:JSON.stringify({from:user,text:msg.value})
 });
 msg.value="";
}

/* LOAD CHAT */
async function loadChat(){
 let r=await fetch(db+"chats/"+cid(user,current)+".json");
 let d=await r.json();
 chatBox.innerHTML="";

 if(!d)return;

 Object.values(d).forEach(m=>{
  let div=document.createElement("div");
  div.className="msg "+(m.from==user?"me":"other");
  div.innerText=m.text;
  chatBox.appendChild(div);
 });

 chatBox.scrollTop=chatBox.scrollHeight;

 /* last seen */
 let u=await fetch(db+"users/"+current+".json");
 let ud=await u.json();
 lastSeen.innerText=ud.online?"Online":"Last seen "+new Date(ud.lastSeen).toLocaleTimeString();
}

/* STATUS */
async function addStatus(){
 await fetch(db+"status/"+user+"/"+Date.now()+".json",{
  method:"PUT",
  body:JSON.stringify({text:statusText.value,time:Date.now()})
 });
 statusText.value="";
 loadStatus();
}

async function loadStatus(){
 let r=await fetch(db+"status.json");
 let d=await r.json();
 statusList.innerHTML="";

 if(!d)return;

 Object.entries(d).forEach(([u,s])=>{
  Object.values(s).forEach(st=>{
    if(Date.now()-st.time<86400000){
      let div=document.createElement("div");
      div.innerText=u+": "+st.text;
      statusList.appendChild(div);
    }
  });
 });
}

/* BACK */
function back(){show("chats");}

/* LOGOUT */
function logout(){
 localStorage.removeItem("user");
 location.reload();
}
</script>

</body>
</html>
