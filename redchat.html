<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RedChaat Pro - Premium Messaging</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;500;600;700&family=Pacifico&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #00bcd4; /* Cyan */
            --secondary: #ff3b30; /* Vibrant Red */
            --accent: #ffd54f; /* Gold */
            --bg: #f0f2f5;
            --sidebar-bg: #ffffff;
            --chat-bg-color: #fdeaea; /* Light red tint for wallpaper */
            --text-main: #111b21;
            --text-sec: #667781;
            --my-msg: #ffebeb; /* Light red for my messages */
            --other-msg: #ffffff;
            --white: #ffffff;
            --border-color: rgba(0,0,0,0.08);
        }

        .dark-theme {
            --bg: #0b141a;
            --sidebar-bg: #111b21;
            --chat-bg-color: #2a0a10; /* Dark red tint */
            --text-main: #e9edef;
            --text-sec: #8696a0;
            --my-msg: #5c0f1e; /* Dark red msg */
            --other-msg: #202c33;
            --white: #111b21;
            --border-color: rgba(255,255,255,0.08);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            background: var(--bg); color: var(--text-main); 
            font-family: 'Hind Siliguri', sans-serif;
            height: 100dvh; /* Dynamic Viewport Height - fixes the mobile input hiding issue */
            width: 100vw;
            overflow: hidden; 
            display: flex; 
        }

        /* Stylized Logo Font */
        .brand-logo {
            font-family: 'Pacifico', cursive;
            color: var(--secondary);
            font-size: 24px;
            letter-spacing: 1px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
        }

        /* Auth Screen */
        .auth-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, var(--secondary), var(--primary)); 
            display: flex; justify-content: center; align-items: center; z-index: 1000;
        }
        .auth-card {
            background: var(--sidebar-bg); padding: 40px 30px; border-radius: 20px; width: 90%; max-width: 380px;
            text-align: center; box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            color: var(--text-main);
        }
        .auth-card input {
            width: 100%; padding: 14px; margin: 10px 0; border: 1px solid var(--border-color); 
            border-radius: 10px; font-size: 15px; background: var(--bg); color: var(--text-main);
        }
        .auth-card button {
            width: 100%; padding: 14px; background: var(--secondary); color: white;
            border: none; border-radius: 10px; font-weight: bold; font-size: 16px; cursor: pointer;
            transition: background 0.3s; margin-top: 10px;
        }
        .auth-card button:hover { background: #e6352b; }

        /* Main Container */
        .app-container { width: 100%; height: 100dvh; display: flex; background: var(--white); }

        /* Sidebar */
        .sidebar {
            width: 30%; min-width: 320px; border-right: 1px solid var(--border-color);
            display: flex; flex-direction: column; background: var(--sidebar-bg); height: 100%;
        }
        .sidebar-header {
            padding: 10px 16px; background: var(--sidebar-bg); height: 70px;
            display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border-color);
            flex-shrink: 0;
        }
        .user-info { display: flex; flex-direction: column; }
        .user-id-top { font-size: 11px; color: var(--text-sec); font-weight: bold; text-transform: uppercase; }
        
        .header-actions i {
            color: var(--text-sec); margin-left: 18px; cursor: pointer; font-size: 18px; transition: color 0.2s;
        }
        .header-actions i:hover { color: var(--primary); }
        .logout-btn { color: var(--secondary) !important; }

        .search-area { padding: 12px; background: var(--sidebar-bg); border-bottom: 1px solid var(--border-color); flex-shrink: 0; }
        .search-box {
            background: var(--bg); display: flex; align-items: center;
            padding: 10px 15px; border-radius: 25px;
        }
        .search-box input {
            background: transparent; border: none; outline: none; width: 100%; padding-left: 10px; color: var(--text-main);
        }

        .chat-list { flex: 1; overflow-y: auto; }
        .chat-item {
            display: flex; padding: 12px 16px; cursor: pointer; transition: 0.2s; align-items: center;
        }
        .chat-item:hover, .chat-item.active { background: var(--bg); }
        .avatar {
            width: 50px; height: 50px; border-radius: 50%; background: var(--primary);
            display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; font-size: 20px;
        }

        /* Main Chat Area */
        .main-chat { flex: 1; display: flex; flex-direction: column; height: 100dvh; background: var(--sidebar-bg); }
        
        .chat-header {
            padding: 10px 16px; background: var(--sidebar-bg); height: 70px;
            display: flex; align-items: center; border-bottom: 1px solid var(--border-color); z-index: 5; flex-shrink: 0;
        }
        .back-btn { display: none; margin-right: 15px; font-size: 20px; color: var(--text-sec); cursor: pointer; }

        /* Indian Pattern Wallpaper */
        .messages-container {
            flex: 1 1 auto; overflow-y: auto; padding: 20px; display: flex; flex-direction: column;
            background-color: var(--chat-bg-color);
            background-image: url('https://www.transparenttextures.com/patterns/paisley.png'); /* Indian Kalka Pattern */
            background-blend-mode: multiply;
        }
        
        .msg {
            max-width: 75%; padding: 10px 14px; border-radius: 12px; margin-bottom: 8px;
            font-size: 15px; position: relative; box-shadow: 0 1px 2px rgba(0,0,0,0.1);
            line-height: 1.4;
        }
        .msg.sent { align-self: flex-end; background: var(--my-msg); border-bottom-right-radius: 2px; border: 1px solid rgba(255,59,48,0.1); }
        .msg.received { align-self: flex-start; background: var(--other-msg); border-bottom-left-radius: 2px; }
        .msg-time { font-size: 10px; color: var(--text-sec); text-align: right; margin-top: 5px; }

        /* Input Bar - Fixed at bottom securely */
        .input-bar {
            padding: 12px 16px; background: var(--sidebar-bg); display: flex; align-items: center; gap: 12px;
            border-top: 1px solid var(--border-color); flex-shrink: 0;
            padding-bottom: calc(12px + env(safe-area-inset-bottom)); /* Support for iPhone notch area */
        }
        .input-bar input {
            flex: 1; background: var(--bg); border: none; outline: none;
            padding: 14px 20px; border-radius: 30px; font-size: 15px; color: var(--text-main);
        }
        .input-bar i { color: var(--text-sec); font-size: 22px; cursor: pointer; transition: 0.2s; }
        .input-bar i:hover { color: var(--primary); }
        
        .send-btn { 
            background: var(--secondary); color: white !important; width: 45px; height: 45px; 
            border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 2px 5px rgba(255,59,48,0.3);
        }

        @media (max-width: 768px) {
            .sidebar { width: 100%; min-width: 100%; }
            .main-chat { display: none; position: absolute; top: 0; left: 0; width: 100%; z-index: 10; }
            .active-chat-mobile .main-chat { display: flex; }
            .back-btn { display: block; }
            .msg { max-width: 85%; }
        }
    </style>
</head>
<body id="bodyTag">

    <div id="authArea" class="auth-overlay">
        <div class="auth-card" id="loginBox">
            <div class="brand-logo" style="font-size: 36px; margin-bottom: 20px;">RedChaat</div>
            <input type="text" id="uID" placeholder="আপনার ইউজার আইডি">
            <input type="password" id="uPass" placeholder="পাসওয়ার্ড">
            <button onclick="login()">প্রবেশ করুন</button>
            <p style="margin-top:20px; font-size:14px; cursor:pointer; color: var(--text-sec);" onclick="toggleAuth(false)">নতুন আইডি তৈরি করতে চান? <b>সাইন আপ</b></p>
        </div>
        <div class="auth-card" id="signupBox" style="display:none;">
            <div class="brand-logo" style="font-size: 36px; margin-bottom: 20px;">RedChaat</div>
            <input type="text" id="sID" placeholder="নতুন আইডি নাম">
            <input type="password" id="sPass" placeholder="পাসওয়ার্ড তৈরি করুন">
            <button onclick="signup()">সাইন আপ</button>
            <p style="margin-top:20px; font-size:14px; cursor:pointer; color: var(--text-sec);" onclick="toggleAuth(true)">ইতিমধ্যে আইডি আছে? <b>লগইন করুন</b></p>
        </div>
    </div>

    <div class="app-container" id="appMain" style="display:none;">
        
        <div class="sidebar">
            <div class="sidebar-header">
                <div class="user-info">
                    <span class="user-id-top" id="topIdDisplay">ID: LOADING</span>
                    <span class="brand-logo">RedChaat</span>
                </div>
                <div class="header-actions">
                    <i class="fa-solid fa-moon" onclick="toggleTheme()" title="ডার্ক মোড"></i>
                    <i class="fa-solid fa-user-plus" onclick="addFriend()" title="বন্ধু যোগ করুন"></i>
                    <i class="fa-solid fa-right-from-bracket logout-btn" onclick="logout()" title="লগ আউট"></i>
                </div>
            </div>
            <div class="search-area">
                <div class="search-box">
                    <i class="fa-solid fa-magnifying-glass"></i>
                    <input type="text" placeholder="বন্ধুদের খুঁজুন...">
                </div>
            </div>
            <div class="chat-list" id="chatList"></div>
        </div>

        <div class="main-chat" id="mainChatView">
            <div id="noChat" style="flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; color:var(--text-sec); background: var(--sidebar-bg);">
                <div class="brand-logo" style="font-size: 50px; opacity: 0.3; margin-bottom: 10px;">R</div>
                <p style="font-size: 18px;">মেসেজ পাঠাতে কোনো বন্ধুকে সিলেক্ট করুন</p>
            </div>
            
            <div id="chatWindow" style="display:none; flex-direction:column; height:100%;">
                <div class="chat-header">
                    <i class="fa-solid fa-arrow-left back-btn" onclick="closeChat()"></i>
                    <div class="avatar" id="chatAvatar">?</div>
                    <div style="margin-left:15px; flex:1;">
                        <div style="font-weight:600; font-size: 17px;" id="chatName">বন্ধুর নাম</div>
                        <div style="font-size:12px; color:var(--text-sec);" id="status">অফলাইন</div>
                    </div>
                    <div class="header-actions">
                        <i class="fa-solid fa-ellipsis-vertical"></i>
                    </div>
                </div>
                
                <div class="messages-container" id="msgBox">
                    </div>
                
                <div class="input-bar">
                    <i class="fa-regular fa-face-smile"></i>
                    <i class="fa-solid fa-paperclip"></i>
                    <input type="text" id="msgInput" placeholder="আপনার মেসেজ লিখুন..." autocomplete="off" onkeypress="if(event.key==='Enter') send()">
                    <div class="send-btn" onclick="send()">
                        <i class="fa-solid fa-paper-plane" style="color: white; font-size: 18px; margin-left: -2px;"></i>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const DB = "https://redchaat-ffad2-default-rtdb.firebaseio.com/";
        let user = localStorage.getItem("user");
        let activeChat = null;
        let chatInterval = null;

        // Init App
        if(user) {
            document.getElementById('authArea').style.display = 'none';
            document.getElementById('appMain').style.display = 'flex';
            document.getElementById('topIdDisplay').innerText = "ID: " + user;
            
            if(localStorage.getItem("theme") === "dark") document.body.classList.add("dark-theme");
            
            loadChats();
            setInterval(loadChats, 5000);
            setOnline(true);
        }

        function toggleAuth(isLogin) {
            document.getElementById('loginBox').style.display = isLogin ? 'block' : 'none';
            document.getElementById('signupBox').style.display = isLogin ? 'none' : 'block';
        }

        async function signup() {
            let id = sID.value.trim();
            if(!id) return alert("দয়া করে আইডি লিখুন");
            let check = await fetch(DB+"users/"+id+".json");
            if(await check.json()) return alert("এই আইডিটি ইতিমধ্যে নেওয়া হয়েছে। অন্য আইডি দিন।");
            await fetch(DB+"users/"+id+".json", {method:"PUT", body:JSON.stringify({password:sPass.value, online:true})});
            alert("অ্যাকাউন্ট তৈরি সফল! এবার লগইন করুন।");
            toggleAuth(true);
        }

        async function login() {
            let id = uID.value.trim();
            let res = await fetch(DB+"users/"+id+".json");
            let data = await res.json();
            if(!data || data.password !== uPass.value) return alert("ভুল আইডি বা পাসওয়ার্ড দিয়েছেন!");
            localStorage.setItem("user", id);
            location.reload();
        }

        function logout() {
            setOnline(false);
            localStorage.removeItem("user");
            location.reload();
        }

        async function setOnline(st) {
            if(user) fetch(DB+"users/"+user+"/online.json", {method:"PUT", body:JSON.stringify(st)});
        }

        async function addFriend() {
            let f = prompt("বন্ধুর আইডি লিখুন:");
            if(!f || f === user) return;
            let check = await fetch(DB+"users/"+f+".json");
            if(!await check.json()) return alert("এই নামে কোনো ইউজার পাওয়া যায়নি!");
            await fetch(DB+"users/"+user+"/friends/"+f+".json", {method:"PUT", body:"true"});
            await fetch(DB+"users/"+f+"/friends/"+user+".json", {method:"PUT", body:"true"});
            loadChats();
        }

        async function loadChats() {
            let res = await fetch(DB+"users/"+user+"/friends.json");
            let friends = await res.json();
            chatList.innerHTML = "";
            if(!friends) return;
            for(let f in friends) {
                let uRes = await fetch(DB+"users/"+f+".json");
                let uData = await uRes.json();
                let div = document.createElement("div");
                div.className = "chat-item " + (activeChat === f ? 'active' : '');
                div.innerHTML = `<div class="avatar" style="background:${getRandomColor(f)}">${f[0].toUpperCase()}</div>
                                 <div style="margin-left:15px; flex:1;">
                                    <div style="font-weight:600; font-size:16px;">${f} ${uData.online ? '<span style="color:#4caf50; font-size:10px;">●</span>':''}</div>
                                    <div style="font-size:13px; color:var(--text-sec); margin-top:3px;">চ্যাট করতে ক্লিক করুন...</div>
                                 </div>`;
                div.onclick = () => openChat(f);
                chatList.appendChild(div);
            }
        }

        function openChat(f) {
            activeChat = f;
            document.getElementById('noChat').style.display = 'none';
            document.getElementById('chatWindow').style.display = 'flex';
            chatName.innerText = f;
            chatAvatar.innerText = f[0].toUpperCase();
            chatAvatar.style.background = getRandomColor(f);
            
            if(window.innerWidth <= 768) {
                document.getElementById('bodyTag').classList.add('active-chat-mobile');
            }

            if(chatInterval) clearInterval(chatInterval);
            loadMsgs();
            chatInterval = setInterval(loadMsgs, 2000);
            updateStatus(f);
        }

        function closeChat() {
            document.getElementById('bodyTag').classList.remove('active-chat-mobile');
            activeChat = null;
        }

        async function updateStatus(f) {
            let res = await fetch(DB+"users/"+f+"/online.json");
            let isOnline = await res.json();
            document.getElementById('status').innerText = isOnline ? "অনলাইন" : "অফলাইন";
        }

        async function send() {
            let txt = msgInput.value.trim();
            if(!txt) return;
            let cid = user < activeChat ? user+"_"+activeChat : activeChat+"_"+user;
            let time = Date.now();
            await fetch(DB+"chats/"+cid+"/"+time+".json", {
                method:"PUT", body:JSON.stringify({from:user, text:txt, time:time, seen:false})
            });
            msgInput.value = "";
            loadMsgs();
        }

        async function loadMsgs() {
            if(!activeChat) return;
            let cid = user < activeChat ? user+"_"+activeChat : activeChat+"_"+user;
            let res = await fetch(DB+"chats/"+cid+".json");
            let msgs = await res.json();
            
            let isScrolledToBottom = msgBox.scrollHeight - msgBox.clientHeight <= msgBox.scrollTop + 1;
            msgBox.innerHTML = "";
            
            if(msgs) {
                Object.values(msgs).forEach(m => {
                    let div = document.createElement("div");
                    div.className = "msg " + (m.from === user ? "sent" : "received");
                    let time = new Date(m.time).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
                    div.innerHTML = `<div>${m.text}</div>
                                     <div class="msg-time">${time} ${m.from === user ? (m.seen ? '<i class="fa-solid fa-check-double" style="color:#00bcd4"></i>' : '<i class="fa-solid fa-check"></i>') : ''}</div>`;
                    msgBox.appendChild(div);
                    
                    if(m.from !== user && !m.seen) {
                        fetch(DB+"chats/"+cid+"/"+m.time+"/seen.json", {method:"PUT", body:"true"});
                    }
                });
            }
            if(isScrolledToBottom) msgBox.scrollTop = msgBox.scrollHeight;
        }

        function toggleTheme() {
            document.body.classList.toggle("dark-theme");
            localStorage.setItem("theme", document.body.classList.contains("dark-theme") ? "dark" : "light");
        }

        function getRandomColor(s) {
            let colors = ['#ff3b30', '#00bcd4', '#ff9800', '#4caf50', '#9c27b0', '#e91e63'];
            return colors[s.length % colors.length];
        }

        window.onbeforeunload = () => setOnline(false);
    </script>
    <style>
    /* Red Story UI Styles */
    .story-modal { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100dvh; background: var(--bg); z-index: 1500; flex-direction: column; color: var(--text-main); }
    .story-header { padding: 15px 20px; background: var(--sidebar-bg); display: flex; align-items: center; gap: 15px; border-bottom: 1px solid var(--border-color); font-size: 18px; font-weight: bold; }
    .story-list-container { flex: 1; overflow-y: auto; padding: 20px; }
    .story-card { background: var(--sidebar-bg); padding: 15px; border-radius: 12px; display: flex; align-items: center; gap: 15px; margin-bottom: 12px; cursor: pointer; box-shadow: 0 2px 5px rgba(0,0,0,0.05); transition: 0.2s; }
    .story-card:hover { transform: scale(1.02); }
    .story-ring { width: 55px; height: 55px; border-radius: 50%; padding: 3px; background: linear-gradient(45deg, #ff3b30, #ffd54f); flex-shrink: 0; }
    .story-ring.gray { background: #ccc; }
    .story-ring div, .story-ring img { width: 100%; height: 100%; border-radius: 50%; background: var(--bg); display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 20px; color: var(--primary); object-fit: cover; }
    
    /* Create Story Floating Button */
    .add-story-btn { position: absolute; bottom: 30px; right: 30px; width: 60px; height: 60px; background: var(--secondary); color: white; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 24px; cursor: pointer; box-shadow: 0 4px 15px rgba(255,59,48,0.5); z-index: 1510; transition: transform 0.2s; }
    .add-story-btn:hover { transform: scale(1.1); }
    
    /* Full Screen Status Viewer */
    .full-story-viewer { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100dvh; background: #000; z-index: 2000; flex-direction: column; justify-content: center; align-items: center; }
    .full-story-top { position: absolute; top: 0; left: 0; width: 100%; padding: 20px; display: flex; justify-content: space-between; align-items: center; background: linear-gradient(rgba(0,0,0,0.7), transparent); color: white; z-index: 2010; }
    .story-content-img { max-width: 100vw; max-height: 100dvh; object-fit: contain; }
    .story-content-text { font-size: 32px; color: white; text-align: center; padding: 40px; font-family: 'Hind Siliguri', sans-serif; background: linear-gradient(135deg, var(--secondary), var(--primary)); width: 100vw; height: 100dvh; display: flex; align-items: center; justify-content: center; word-wrap: break-word; }
    
    /* Reactions */
    .reaction-bar { position: absolute; bottom: 40px; display: flex; gap: 20px; background: rgba(255,255,255,0.15); padding: 12px 25px; border-radius: 30px; backdrop-filter: blur(10px); z-index: 2010; }
    .react-emoji { font-size: 30px; cursor: pointer; transition: transform 0.2s; user-select: none; }
    .react-emoji:hover { transform: scale(1.3) translateY(-5px); }
    
    @keyframes floatEmoji { 0% { opacity: 1; transform: translate(-50%, 0) scale(1); } 100% { opacity: 0; transform: translate(-50%, -250px) scale(1.5); } }
    
    /* Progress Bar (Time duration) */
    .progress-bar { position: absolute; top: 5px; left: 5px; right: 5px; height: 3px; background: rgba(255,255,255,0.3); border-radius: 3px; z-index: 2010; display: flex; overflow: hidden; }
    .progress-fill { height: 100%; background: white; width: 0%; border-radius: 3px; animation: progressAnim 5s linear forwards; }
    @keyframes progressAnim { to { width: 100%; } }
</style>

<div id="redStoryModals">
    <div class="story-modal" id="storyModal">
        <div class="story-header">
            <i class="fa-solid fa-arrow-left" style="cursor:pointer;" onclick="closeStoryModal()"></i>
            <span>Red Story <i class="fa-solid fa-camera-retro" style="color:var(--secondary)"></i></span>
        </div>
        <div class="story-list-container" id="storyList"></div>
        <div class="add-story-btn" onclick="addStoryOption()" title="স্টোরি দিন"><i class="fa-solid fa-plus"></i></div>
    </div>

    <div class="full-story-viewer" id="fullStoryViewer">
        <div class="progress-bar"><div class="progress-fill" id="storyProgress"></div></div>
        <div class="full-story-top">
            <div style="display:flex; align-items:center; gap:10px; font-weight:bold;">
                <div class="story-ring" style="width:40px; height:40px; border:none; padding:0; background:none;">

<script>
    // 1. Inject Red Story Button into the existing Header dynamically
    setTimeout(() => {
        let actionDiv = document.querySelector('.header-actions');
        if(actionDiv) {
            let storyBtn = document.createElement('i');

            storyBtn.title = "Red Story";
            storyBtn.onclick = openStoryModal;
            actionDiv.insertBefore(storyBtn, actionDiv.firstChild); // Adds icon to the left side
        }
    }, 1000); 

    // Logic Variables
    let storyAllData = [];
    let curStoryData = null;
    let storyTimerJS = null;

    function openStoryModal() {
        document.getElementById('storyModal').style.display = 'flex';
        loadRedStories();
    }
    
    function closeStoryModal() {
        document.getElementById('storyModal').style.display = 'none';
    }

    async function loadRedStories() {
        let listDiv = document.getElementById('storyList');
        listDiv.innerHTML = '<div style="text-align:center; color:var(--text-sec); margin-top:30px;"><i class="fa-solid fa-spinner fa-spin" style="font-size:30px;"></i><br><br>স্টোরি লোড হচ্ছে...</div>';
        
        // Fetch statuses and friends from Firebase
        let res = await fetch(DB+"status.json");
        let statuses = await res.json() || {};
        
        let fRes = await fetch(DB+"users/"+user+"/friends.json");
        let friends = await fRes.json() || {};
        
        storyAllData = [];
        let html = '';
        let now = Date.now();
        let dayMs = 86400000; // 24 hours in milliseconds (Auto-delete logic)
        
        // --- 1. My Story ---
        let myStories = statuses[user] || {};
        let myActive = Object.entries(myStories).filter(([k,v]) => now - v.time < dayMs);
        
        if(myActive.length > 0) {
            storyAllData.push({uid: user, stories: myActive});
            html += createStoryCardUI(user, 'আমার স্টোরি (My Story)', true);
        } else {
            html += `<div class="story-card" onclick="addStoryOption()">
                        <div class="story-ring gray"><div><i class="fa-solid fa-plus"></i></div></div>
                        <div>
                            <div style="font-weight:bold; font-size:16px;">আমার স্টোরি</div>
                            <div style="font-size:13px; color:var(--text-sec);">নতুন আপডেট দিন</div>
                        </div>
                     </div>`;
        }
        
        html += '<h4 style="margin:20px 0 10px 0; color:var(--text-sec);">বন্ধুদের স্টোরি</h4>';
        
        // --- 2. Friends' Stories ---
        let friendStoryCount = 0;
        for(let f in friends) {
            if(statuses[f]) {
                let fActive = Object.entries(statuses[f]).filter(([k,v]) => now - v.time < dayMs);
                if(fActive.length > 0) {
                    storyAllData.push({uid: f, stories: fActive});
                    html += createStoryCardUI(f, f, false);
                    friendStoryCount++;
                }
            }
        }
        
        if(friendStoryCount === 0) {
            html += '<p style="text-align:center; color:var(--text-sec); margin-top:20px;">বন্ধুদের কোনো নতুন স্টোরি নেই 24 ঘন্টার মধ্যে</p>';
        }
        
        listDiv.innerHTML = html;
    }

    function createStoryCardUI(uid, title, isMe) {
        return `<div class="story-card" onclick="playRedStory('${uid}')">
                    <div class="story-ring"><div>${uid[0].toUpperCase()}</div></div>
                    <div>
                        <div style="font-weight:bold; font-size:16px;">${title}</div>
                        <div style="font-size:13px; color:var(--text-sec);">${isMe ? 'ক্লিক করে দেখুন' : 'নতুন স্টোরি'}</div>
                    </div>
                </div>`;
    }

    function addStoryOption() {
        let opt = prompt("কী স্টোরি দেবেন?\n১. ছবি (Image)\n২. টেক্সট (Text)\n\n(1 বা 2 লিখুন)");
        if(opt == '1' || opt == '১') {
            let i = document.createElement('input'); i.type = 'file'; i.accept="image/*";
            i.onchange = e => {
                let r = new FileReader();
                r.onload = async ev => {
                    document.getElementById('storyList').innerHTML = '<div style="text-align:center; margin-top:20px;">আপলোড হচ্ছে... দয়া করে অপেক্ষা করুন।</div>';
                    await fetch(DB+"status/"+user+"/"+Date.now()+".json", {method:"PUT", body:JSON.stringify({img:ev.target.result, time:Date.now()})});
                    loadRedStories();
                };
                r.readAsDataURL(e.target.files[0]);
            };
            i.click();
        } else if(opt == '2' || opt == '২') {
            let t = prompt("স্টোরিতে কী লিখতে চান?");
            if(t) {
                fetch(DB+"status/"+user+"/"+Date.now()+".json", {method:"PUT", body:JSON.stringify({text:t, time:Date.now()})}).then(()=>{
                    loadRedStories();
                });
            }
        }
    }

    function playRedStory(uid) {
        let userObj = storyAllData.find(s => s.uid === uid);
        if(!userObj) return;
        
        // Show the latest story of the selected user
        let latestStory = userObj.stories[userObj.stories.length - 1]; 
        curStoryData = { uid: uid, sid: latestStory[0], data: latestStory[1] };
        
        document.getElementById('fullStoryViewer').style.display = 'flex';
        let contentDiv = document.getElementById('storyContent');
        
        if(curStoryData.data.img) {
            contentDiv.innerHTML = `<img src="${curStoryData.data.img}" class="story-content-img">`;
        } else {
            contentDiv.innerHTML = `<div class="story-content-text">${curStoryData.data.text}</div>`;
        }
        
        document.getElementById('storyAuthor').innerText = uid === user ? 'আমার স্টোরি' : uid;
        document.getElementById('viewerAvatar').innerText = uid[0].toUpperCase();
        
        // Restart Progress Bar Animation
        let progFill = document.getElementById('storyProgress');
        progFill.style.animation = 'none';
        progFill.offsetHeight; 
        progFill.style.animation = null; 
        
        // Hide reaction bar if it is my own story
        document.getElementById('reactionBar').style.display = uid === user ? 'none' : 'flex';
        
        // Auto Close after 5 Seconds
        clearTimeout(storyTimerJS);
        storyTimerJS = setTimeout(closeStoryViewer, 5000); 
    }

    function closeStoryViewer() {
        document.getElementById('fullStoryViewer').style.display = 'none';
        clearTimeout(storyTimerJS);
    }

    function reactStory(emoji) {
        if(!curStoryData || curStoryData.uid === user) return;
        
        // Floating emoji animation
        let floater = document.createElement('div');
        floater.innerText = emoji;
        floater.style.position = 'absolute';
        floater.style.bottom = '100px';
        floater.style.left = '50%';
        floater.style.transform = 'translateX(-50%)';
        floater.style.fontSize = '50px';
        floater.style.animation = 'floatEmoji 1.5s ease-out forwards';
        floater.style.pointerEvents = 'none';
        floater.style.zIndex = '2050';
        document.getElementById('fullStoryViewer').appendChild(floater);
        
        setTimeout(() => floater.remove(), 1500); // Remove element after animation
        
        // Save Reaction to Firebase Database quietly
        fetch(DB+"status/"+curStoryData.uid+"/"+curStoryData.sid+"/reactions/"+user+".json", {method:"PUT", body:JSON.stringify(emoji)});
    }
</script>

<script>
    function playRedChaatTheme() {
        // Web Audio API for generating the digital jingle
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        function playNote(freq, startTime, duration) {
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            
            // 'sine' wave gives a smooth, modern app notification sound
            osc.type = 'sine'; 
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime + startTime);
            
            // Fade in and fade out the volume to avoid clicking noises
            gainNode.gain.setValueAtTime(0, audioCtx.currentTime + startTime);
            gainNode.gain.linearRampToValueAtTime(0.3, audioCtx.currentTime + startTime + 0.1);
            gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + startTime + duration);
            
            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            
            osc.start(audioCtx.currentTime + startTime);
            osc.stop(audioCtx.currentTime + startTime + duration);
        }

        // Play a quick, uplifting 3-note melody
        playNote(523.25, 0, 0.4);   // Note 1 (C5)
        playNote(659.25, 0.2, 0.4); // Note 2 (E5)
        playNote(783.99, 0.4, 0.6); // Note 3 (G5)

        // Web Speech API to say "RedChaat" right after the melody
        setTimeout(() => {
            const utterance = new SpeechSynthesisUtterance("Red Chaat");
            utterance.lang = 'en-IN'; // Indian English accent for a natural feel
            utterance.rate = 0.9;     // Slightly slower for style
            utterance.pitch = 1.2;    // Slightly higher pitch for energy
            window.speechSynthesis.speak(utterance);
        }, 800); // 800 milliseconds delay so the melody finishes first
    }

    // Add a Music Button in the header actions area dynamically
    setTimeout(() => {
        let actionDiv = document.querySelector('.header-actions');
        if(actionDiv) {
            let musicBtn = document.createElement('i');
            musicBtn.className = "fa-solid fa-music";
            musicBtn.style.color = "var(--accent)"; // Gold color to stand out
            musicBtn.style.marginLeft = "18px";
            musicBtn.style.cursor = "pointer";
            musicBtn.title = "Play Theme Music";
            
            // Add pulse animation on hover
            musicBtn.onmouseover = () => musicBtn.style.transform = "scale(1.2)";
            musicBtn.onmouseout = () => musicBtn.style.transform = "scale(1)";
            musicBtn.style.transition = "transform 0.2s";
            
            musicBtn.onclick = playRedChaatTheme;
            
            // Insert it before the first icon
            actionDiv.insertBefore(musicBtn, actionDiv.firstChild);
        }
    }, 2000); // Wait 2 seconds to ensure the header is fully loaded
</script>

    // 2. Upgrade the loadMsgs function to support Images and Message Deletion
    async function loadMsgs() {
        if(!activeChat) return;
        let cid = user < activeChat ? user+"_"+activeChat : activeChat+"_"+user;
        let res = await fetch(DB+"chats/"+cid+".json");
        let msgs = await res.json();
        
        let isScrolledToBottom = msgBox.scrollHeight - msgBox.clientHeight <= msgBox.scrollTop + 1;
        msgBox.innerHTML = "";
        
        if(msgs) {
            Object.values(msgs).forEach(m => {
                let div = document.createElement("div");
                div.className = "msg " + (m.from === user ? "sent" : "received");
                div.title = "ডিলিট করতে মেসেজে ডাবল-ক্লিক করুন";
                
                let time = new Date(m.time).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
                
                // Check if the message is an image or text
                let contentHTML = "";
                if(m.img) {
                    contentHTML = `<img src="${m.img}" style="max-width:100%; border-radius:8px; margin-bottom:5px; cursor:pointer;" onclick="window.open('${m.img}', '_blank')">`;
                } else if(m.text) {
                    contentHTML = `<div>${m.text}</div>`;
                } else {
                    contentHTML = `<div style="font-style:italic; color:var(--text-sec);">মেসেজটি ডিলিট করা হয়েছে 🚫</div>`;
                }
                
                div.innerHTML = `${contentHTML}
                                 <div class="msg-time">${time} ${m.from === user ? (m.seen ? '<i class="fa-solid fa-check-double" style="color:#00bcd4"></i>' : '<i class="fa-solid fa-check"></i>') : ''}</div>`;
                
                // Double click to Delete For Everyone
                div.ondblclick = async () => {
                    if(m.text === null && m.img === null) return; // Already deleted
                    if(confirm("এই মেসেজটি কি সবার জন্য ডিলিট করতে চান? (Delete for Everyone)")) {
                        // Instead of full delete, update it to empty so it shows as deleted
                        await fetch(DB+"chats/"+cid+"/"+m.time+".json", {
                            method:"PUT", 
                            body:JSON.stringify({from:m.from, text:null, img:null, time:m.time, seen:m.seen})
                        });
                        loadMsgs();
                    }
                };
                
                msgBox.appendChild(div);
                
                // Mark as seen logic
                if(m.from !== user && !m.seen && m.text !== null) {
                    fetch(DB+"chats/"+cid+"/"+m.time+"/seen.json", {method:"PUT", body:"true"});
                }
            });
        }
        if(isScrolledToBottom) msgBox.scrollTop = msgBox.scrollHeight;
    }
</script>

    async function setOnline(st) {

    async function updateStatus(f) {
        let res = await fetch(DB+"users/"+f+".json");
        let uData = await res.json();
        let statusEl = document.getElementById('status');
        
        if(uData.online) {
            statusEl.innerText = "অনলাইন";
        } else {
            if(uData.lastSeen) {
                let date = new Date(uData.lastSeen);
                let today = new Date();
                let prefix = "";
                
                if(date.toDateString() === today.toDateString()) {
                    prefix = "আজ ";
                } else {
                    let yesterday = new Date(today);
                    yesterday.setDate(yesterday.getDate() - 1);
                    if(date.toDateString() === yesterday.toDateString()) {
                        prefix = "গতকাল ";
                    } else {
                        prefix = date.toLocaleDateString() + " ";
                    }
                }
                statusEl.innerText = "Last seen " + prefix + "at " + date.toLocaleTimeString('en-IN', {hour:'2-digit', minute:'2-digit'});
            } else {
                statusEl.innerText = "অফলাইন";
            }
        }
    }

        let cid = user < activeChat ? user+"_"+activeChat : activeChat+"_"+user;
        let time = Date.now();
        
        let payload = {from:user, text:txt, time:time, seen:false};
        if(replyData) payload.replyTo = replyData; // Attach reply data
        
        await fetch(DB+"chats/"+cid+"/"+time+".json", { method:"PUT", body:JSON.stringify(payload) });
        
        msgInput.value = "";
        cancelReply();
        document.getElementById('emojiPicker').style.display = 'none';
        loadMsgs();
    }

    async function loadMsgs() {
        if(!activeChat) return;
        let cid = user < activeChat ? user+"_"+activeChat : activeChat+"_"+user;
        let res = await fetch(DB+"chats/"+cid+".json");
        let msgs = await res.json();
        
        let isScrolledToBottom = msgBox.scrollHeight - msgBox.clientHeight <= msgBox.scrollTop + 1;
        msgBox.innerHTML = "";
        
        if(msgs) {
            Object.values(msgs).forEach(m => {
                let div = document.createElement("div");
                div.className = "msg " + (m.from === user ? "sent" : "received");
                div.title = "রিপ্লাই দিতে ক্লিক করুন, ডিলিট করতে ডাবল-ক্লিক করুন";
                
                let time = new Date(m.time).toLocaleTimeString('en-IN', {hour:'2-digit', minute:'2-digit'});
                
                // Reply Box rendering
                let quotedHTML = "";
                if(m.replyTo) {
                    let senderName = m.replyTo.sender === user ? 'আপনি' : m.replyTo.sender;
                    quotedHTML = `<div class="quoted-msg-box">
                                    <div style="font-weight:bold; color:var(--primary);">${senderName}</div>
                                    <div style="white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">${m.replyTo.text}</div>
                                  </div>`;
                }

                // Main Content rendering
                let contentHTML = "";
                if(m.img) {
                    contentHTML = `<img src="${m.img}" style="max-width:100%; border-radius:8px; margin-bottom:5px; cursor:pointer;" onclick="window.open('${m.img}', '_blank')">`;
                } else if(m.text) {
                    contentHTML = `<div>${m.text}</div>`;
                } else {
                    contentHTML = `<div style="font-style:italic; color:var(--text-sec);">মেসেজটি ডিলিট করা হয়েছে 🚫</div>`;
                }
                
                div.innerHTML = `${quotedHTML}${contentHTML}
                                 <div class="msg-time">${time} ${m.from === user ? (m.seen ? '<i class="fa-solid fa-check-double" style="color:#00bcd4"></i>' : '<i class="fa-solid fa-check"></i>') : ''}</div>`;
                
                // Single click to Reply
                div.onclick = (e) => {
                    if(e.target.tagName === 'IMG') return; // Don't trigger if clicked on an image directly
                    if(m.text !== null || m.img !== null) {
                        initiateReply(m.from, m.text, m.img);
                    }
                };

                // Double click to Delete
                div.ondblclick = async (e) => {
                    e.stopPropagation(); // Prevents the reply logic from triggering
                    if(m.text === null && m.img === null) return;
                    if(confirm("এই মেসেজটি কি সবার জন্য ডিলিট করতে চান?")) {
                        await fetch(DB+"chats/"+cid+"/"+m.time+".json", {
                            method:"PUT", 
                            body:JSON.stringify({from:m.from, text:null, img:null, time:m.time, seen:m.seen, replyTo: m.replyTo})
                        });
                        loadMsgs();
                    }
                };
                
                msgBox.appendChild(div);
                
                if(m.from !== user && !m.seen && (m.text !== null || m.img !== null)) {
                    fetch(DB+"chats/"+cid+"/"+m.time+"/seen.json", {method:"PUT", body:"true"});
                }
            });
        }
        if(isScrolledToBottom) msgBox.scrollTop = msgBox.scrollHeight;
    }
</script>
<style>
    /* Secret Message CSS */
    .secret-wrap { position: relative; display: inline-block; cursor: pointer; min-width: 120px; text-align: center; }
    .secret-content { filter: blur(10px); transition: filter 0.5s ease; user-select: none; }
    .secret-cover {
        position: absolute; top: 0; left: 0; width: 100%; height: 100%;
        background: repeating-linear-gradient(45deg, var(--secondary), var(--secondary) 10px, var(--accent) 10px, var(--accent) 20px);
        border-radius: 8px; display: flex; align-items: center; justify-content: center;
        color: white; font-weight: bold; font-size: 20px; text-shadow: 1px 1px 3px rgba(0,0,0,0.5); z-index: 2;
        transition: opacity 0.5s ease, transform 0.5s ease;
    }
    .secret-wrap.revealed .secret-cover { opacity: 0; transform: scale(1.2); pointer-events: none; }
    .secret-wrap.revealed .secret-content { filter: blur(0px); }

    /* Magic Effects CSS Animations */
    .magic-item { position: fixed; pointer-events: none; z-index: 9999; font-size: 30px; }
    @keyframes floatUp { 0% { transform: translateY(100dvh) scale(0.5); opacity: 1; } 100% { transform: translateY(-20dvh) scale(1.5); opacity: 0; } }
    @keyframes fallDown { 0% { transform: translateY(-10dvh) rotate(0deg); opacity: 1; } 100% { transform: translateY(100dvh) rotate(360deg); opacity: 0; } }
</style>

<script>
    let isSecretMsg = false;
    let playedEffects = new Set(); // To remember which messages already showed animations

    // 1. Add "Gift" Button for Secret Messages in Input Bar
    setTimeout(() => {
        let inputBar = document.querySelector('.input-bar');
        let msgInputbox = document.getElementById('msgInput');
        
        let giftBtn = document.createElement('i');
        giftBtn.className = "fa-solid fa-gift";
        giftBtn.id = "secretToggleBtn";
        giftBtn.style.color = "var(--text-sec)";
        giftBtn.style.cursor = "pointer";
        giftBtn.title = "সিক্রেট মেসেজ অন/অফ";
        
        giftBtn.onclick = () => {
            isSecretMsg = !isSecretMsg;
            giftBtn.style.color = isSecretMsg ? "var(--secondary)" : "var(--text-sec)";
            msgInputbox.placeholder = isSecretMsg ? "🎁 গোপন মেসেজ লিখুন..." : "আপনার মেসেজ লিখুন...";
            if(isSecretMsg) {
                giftBtn.style.transform = "scale(1.2)";
                setTimeout(()=> giftBtn.style.transform = "scale(1)", 200);
            }
        };
        
        inputBar.insertBefore(giftBtn, msgInputbox);
    }, 2000);

    // 2. Magic Effects Engine
    function triggerMagic(text, msgId) {
        if(playedEffects.has(msgId)) return; // Don't repeat animation for old messages
        
        text = text.toLowerCase();
        let matched = false;

        if(text.includes('happy birthday') || text.includes('শুভ জন্মদিন')) {
            createMagicElements(['🎈','🎂','🎉','🎁'], 'floatUp', 30);
            matched = true;
        } 
        else if(text.includes('redchaat') || text.includes('red chaat')) {
            createMagicElements(['🔴','✨','🟥','🔥'], 'fallDown', 40);
            matched = true;
        }
        else if(text.includes('ভালোবাসি') || text.includes('love you')) {
            createMagicElements(['❤️','💖','💕','💘'], 'floatUp', 30);
            matched = true;
        }

        if(matched) {
            playedEffects.add(msgId);
            // Play a small pop sound for the effect
            let audio = new Audio('https://www.soundjay.com/buttons/sounds/button-09.mp3'); 
            audio.volume = 0.5;
            audio.play().catch(e=>console.log(e));
        }
    }

    function createMagicElements(emojis, animationName, count) {
        for(let i=0; i<count; i++) {
            let el = document.createElement('div');
            el.className = 'magic-item';
            el.innerText = emojis[Math.floor(Math.random() * emojis.length)];
            el.style.left = Math.random() * 100 + 'vw';
            el.style.animation = `${animationName} ${Math.random() * 2 + 2}s linear forwards`;
            el.style.fontSize = (Math.random() * 20 + 20) + 'px';
            document.body.appendChild(el);
            
            // Remove element after animation ends
            setTimeout(() => el.remove(), 4000);
        }
    }

    // 3. Upgrade Send Function to handle Secret Flag
    async function send() {
        let txt = msgInput.value.trim();
        if(!txt) return;
        let cid = user < activeChat ? user+"_"+activeChat : activeChat+"_"+user;
        let time = Date.now();
        
        let payload = {from:user, text:txt, time:time, seen:false, secret: isSecretMsg};
        if(typeof replyData !== 'undefined' && replyData) payload.replyTo = replyData;
        
        await fetch(DB+"chats/"+cid+"/"+time+".json", { method:"PUT", body:JSON.stringify(payload) });
        
        msgInput.value = "";
        
        // Reset secret toggle after sending
        if(isSecretMsg) document.getElementById('secretToggleBtn').click();
        
        if(typeof cancelReply === 'function') cancelReply();
        let emojiPicker = document.getElementById('emojiPicker');
        if(emojiPicker) emojiPicker.style.display = 'none';
        
        loadMsgs();
    }

    // 4. Upgrade LoadMsgs to render Magic & Secret features
    async function loadMsgs() {
        if(!activeChat) return;
        let cid = user < activeChat ? user+"_"+activeChat : activeChat+"_"+user;
        let res = await fetch(DB+"chats/"+cid+".json");
        let msgs = await res.json();
        
        let isScrolledToBottom = msgBox.scrollHeight - msgBox.clientHeight <= msgBox.scrollTop + 1;
        msgBox.innerHTML = "";
        
        if(msgs) {
            Object.values(msgs).forEach(m => {
                let div = document.createElement("div");
                div.className = "msg " + (m.from === user ? "sent" : "received");
                div.title = "রিপ্লাই দিতে ক্লিক করুন, ডিলিট করতে ডাবল-ক্লিক করুন";
                
                let time = new Date(m.time).toLocaleTimeString('en-IN', {hour:'2-digit', minute:'2-digit'});
                
                let quotedHTML = "";
                if(m.replyTo) {
                    let senderName = m.replyTo.sender === user ? 'আপনি' : m.replyTo.sender;
                    quotedHTML = `<div class="quoted-msg-box">
                                    <div style="font-weight:bold; color:var(--primary);">${senderName}</div>
                                    <div style="white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">${m.replyTo.text}</div>
                                  </div>`;
                }

                let contentHTML = "";
                if(m.img) {
                    contentHTML = `<img src="${m.img}" style="max-width:100%; border-radius:8px; margin-bottom:5px; cursor:pointer;" onclick="window.open('${m.img}', '_blank')">`;
                } else if(m.text) {
                    // Check if it's a secret message
                    if(m.secret) {
                        contentHTML = `
                        <div class="secret-wrap" onclick="this.classList.add('revealed')">
                            <div class="secret-cover">🎁</div>
                            <div class="secret-content">${m.text}</div>
                        </div>`;
                    } else {
                        contentHTML = `<div>${m.text}</div>`;
                        // Trigger magic effect if text contains keywords
                        triggerMagic(m.text, m.time);
                    }
                } else {
                    contentHTML = `<div style="font-style:italic; color:var(--text-sec);">মেসেজটি ডিলিট করা হয়েছে 🚫</div>`;
                }
                
                div.innerHTML = `${quotedHTML}${contentHTML}
                                 <div class="msg-time">${time} ${m.from === user ? (m.seen ? '<i class="fa-solid fa-check-double" style="color:#00bcd4"></i>' : '<i class="fa-solid fa-check"></i>') : ''}</div>`;
                
                div.onclick = (e) => {
                    if(e.target.tagName === 'IMG' || e.target.closest('.secret-wrap')) return; 
                    if((m.text !== null || m.img !== null) && typeof initiateReply === 'function') {
                        initiateReply(m.from, m.text, m.img);
                    }
                };

                div.ondblclick = async (e) => {
                    e.stopPropagation(); 
                    if(m.text === null && m.img === null) return;
                    if(confirm("এই মেসেজটি কি সবার জন্য ডিলিট করতে চান?")) {
                        await fetch(DB+"chats/"+cid+"/"+m.time+".json", {
                            method:"PUT", 
                            body:JSON.stringify({from:m.from, text:null, img:null, time:m.time, seen:m.seen, replyTo: m.replyTo})
                        });
                        loadMsgs();
                    }
                };
                
                msgBox.appendChild(div);
                
                if(m.from !== user && !m.seen && (m.text !== null || m.img !== null)) {
                    fetch(DB+"chats/"+cid+"/"+m.time+"/seen.json", {method:"PUT", body:"true"});
                }
            });
        }
        if(isScrolledToBottom) msgBox.scrollTop = msgBox.scrollHeight;
    }
</script>

<script>
    // 1. Inject Avatar Editor Modal into the body
    const avatarModalHTML = `
    <div id="avatarEditorModal" class="auth-overlay" style="display:none; z-index: 3000;">
        <div class="auth-card" style="position:relative; width: 340px; text-align:center;">
            <i class="fa-solid fa-xmark" style="position:absolute; right:15px; top:15px; font-size:22px; cursor:pointer; color:var(--text-sec);" onclick="closeAvatarEditor()"></i>
            <h2 style="color:var(--primary); margin-bottom:20px; font-family:'Hind Siliguri', sans-serif;">আপনার অ্যাভাটার 🧑‍🎤</h2>
            
            <div class="avatar-preview-box">
                <img id="liveAvatarPreview" src="" class="avatar-img" style="background:#f0f2f5;">
            </div>
            
            <select id="avatarStyleDropdown" class="avatar-select" onchange="changeAvatarStyle()">
                <option value="micah">Cool (মডার্ন লুক)</option>
                <option value="adventurer">Adventurer (অ্যাডভেঞ্চার)</option>
                <option value="bottts">3D Bottts (রোবট)</option>
                <option value="fun-emoji">Fun Emoji (মজার ইমোজি)</option>
                <option value="lorelei">Cute (কিউট কার্টুন)</option>
            </select>
            
            <button onclick="shuffleAvatar()" style="background:var(--accent); color:#000; margin-bottom:12px; display:flex; align-items:center; justify-content:center; gap:8px;">
                <i class="fa-solid fa-dice"></i> অন্য ডিজাইন দেখুন (Shuffle)
            </button>
            <button onclick="saveAvatar()" style="display:flex; align-items:center; justify-content:center; gap:8px;">
                <i class="fa-solid fa-check"></i> সেভ করুন
            </button>
        </div>
    </div>`;
    document.body.insertAdjacentHTML('beforeend', avatarModalHTML);

    // 2. Avatar Logic Variables
    let currentAvatarSeed = "";
    let currentAvatarStyle = "micah";

    // 3. Add Profile Picture to Sidebar Header
    setTimeout(async () => {
        let sidebarHeaderInfo = document.querySelector('.user-info');
        if(sidebarHeaderInfo && user) {
            let myRes = await fetch(DB+"users/"+user+".json");
            let myData = await myRes.json();
            let myAvatarParams = myData.avatarParams || `micah/svg?seed=${user}&backgroundColor=b6e3f4`;
            
            let myAvatarDiv = document.createElement('div');
            myAvatarDiv.className = "avatar";
            myAvatarDiv.style.width = "45px"; myAvatarDiv.style.height = "45px";
            myAvatarDiv.style.marginRight = "12px"; myAvatarDiv.style.cursor = "pointer";
            myAvatarDiv.style.background = "transparent";
            myAvatarDiv.title = "আপনার অ্যাভাটার পরিবর্তন করুন";
            myAvatarDiv.id = "mySidebarAvatar";
            myAvatarDiv.innerHTML = `<img src="https://api.dicebear.com/7.x/${myAvatarParams}" class="avatar-img">`;
            myAvatarDiv.onclick = openAvatarEditor;
            
            // Flex row alignment for sidebar header
            let wrapDiv = document.createElement('div');
            wrapDiv.style.display = "flex"; wrapDiv.style.alignItems = "center";
            sidebarHeaderInfo.parentNode.insertBefore(wrapDiv, sidebarHeaderInfo);
            wrapDiv.appendChild(myAvatarDiv);
            wrapDiv.appendChild(sidebarHeaderInfo);
        }
    }, 1500);

    // 4. Editor Functions
    function openAvatarEditor() {
        currentAvatarSeed = currentAvatarSeed || user; // Default seed is username
        document.getElementById('avatarEditorModal').style.display = 'flex';
        updateAvatarPreview();
    }
    
    function closeAvatarEditor() {
        document.getElementById('avatarEditorModal').style.display = 'none';
    }
    
    function shuffleAvatar() {
        // Generate random 5 character string for a completely new avatar face
        currentAvatarSeed = Math.random().toString(36).substring(2, 7);
        updateAvatarPreview();
    }
    
    function changeAvatarStyle() {
        currentAvatarStyle = document.getElementById('avatarStyleDropdown').value;
        updateAvatarPreview();
    }
    
    function updateAvatarPreview() {
        let url = `https://api.dicebear.com/7.x/${currentAvatarStyle}/svg?seed=${currentAvatarSeed}&backgroundColor=b6e3f4,c0aede,d1d4f9,ffd5dc,ffdfbf`;
        document.getElementById('liveAvatarPreview').src = url;
    }
    
    async function saveAvatar() {
        let params = `${currentAvatarStyle}/svg?seed=${currentAvatarSeed}&backgroundColor=b6e3f4,c0aede,d1d4f9,ffd5dc,ffdfbf`;
        await fetch(DB+"users/"+user+"/avatarParams.json", {method:"PUT", body:JSON.stringify(params)});
        
        document.getElementById('mySidebarAvatar').innerHTML = `<img src="https://api.dicebear.com/7.x/${params}" class="avatar-img">`;
        closeAvatarEditor();
        loadChats(); // Refresh friends list so new avatars load
        alert("আপনার নতুন অ্যাভাটার দারুণ লাগছে! 😎");
    }

    // 5. UPGRADE: loadChats to show 3D Avatars instead of Letters
    async function loadChats() {
        let res = await fetch(DB+"users/"+user+"/friends.json");
        let friends = await res.json();
        let chatListDiv = document.getElementById('chatList');
        chatListDiv.innerHTML = "";
        
        if(!friends) return;
        
        for(let f in friends) {
            let uRes = await fetch(DB+"users/"+f+".json");
            let uData = await uRes.json();
            
            // Check if friend has set an avatar, otherwise give a default cool one based on their name
            let avatarParams = uData.avatarParams || `micah/svg?seed=${f}&backgroundColor=d1d4f9`;
            let avatarUrl = `https://api.dicebear.com/7.x/${avatarParams}`;

            let div = document.createElement("div");
            div.className = "chat-item " + (activeChat === f ? 'active' : '');
            
            div.innerHTML = `
                <div class="avatar" style="background:transparent; border:2px solid var(--primary); padding:2px;">
                    <img src="${avatarUrl}" class="avatar-img">
                </div>
                <div style="margin-left:15px; flex:1;">
                    <div style="font-weight:600; font-size:16px;">${f} ${uData.online ? '<span style="color:#4caf50; font-size:10px;">●</span>':''}</div>
                    <div style="font-size:13px; color:var(--text-sec); margin-top:3px;">চ্যাট করতে ক্লিক করুন...</div>
                </div>`;
            
            div.onclick = () => openChat(f);
            chatListDiv.appendChild(div);
        }
    }

    // 6. UPGRADE: openChat to show 3D Avatar in Chat Header
    async function openChat(f) {
        activeChat = f;
        document.getElementById('noChat').style.display = 'none';
        document.getElementById('chatWindow').style.display = 'flex';
        document.getElementById('chatName').innerText = f;
        
        // Fetch friend's avatar for the top header
        let uRes = await fetch(DB+"users/"+f+".json");
        let uData = await uRes.json();
        let avatarParams = uData.avatarParams || `micah/svg?seed=${f}&backgroundColor=d1d4f9`;
        
        let chatAvatar = document.getElementById('chatAvatar');
        chatAvatar.innerHTML = `<img src="https://api.dicebear.com/7.x/${avatarParams}" class="avatar-img">`;
        chatAvatar.style.background = "transparent";
        chatAvatar.style.border = "2px solid var(--primary)";
        chatAvatar.style.padding = "2px";
        
        if(window.innerWidth <= 768) {
            document.getElementById('bodyTag').classList.add('active-chat-mobile');
        }

        if(typeof chatInterval !== 'undefined' && chatInterval) clearInterval(chatInterval);
        if(typeof loadMsgs === 'function') loadMsgs();
        chatInterval = setInterval(() => { if(typeof loadMsgs === 'function') loadMsgs(); }, 2000);
        
        if(typeof updateStatus === 'function') updateStatus(f);
    }
            </script>
