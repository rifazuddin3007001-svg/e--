<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>RedChaat v10</title>

<style>
:root{
  --primary:#00bcd4;
  --accent:#ffd54f;
  --bg:#e0f7fa;
  --card:#ffffff;
  --text:#000;
}
.dark{
  --bg:#0a1a1f;
  --card:#12252b;
  --text:#fff;
}

body{
  margin:0;
  font-family:sans-serif;
  background:var(--bg);
  color:var(--text);
}

/* HEADER */
header{
  background:var(--primary);
  color:#fff;
  padding:12px;
  display:flex;
  justify-content:space-between;
}

/* SCREEN */
.screen{display:none;padding:10px;}
.active{display:block;}

/* CHAT LIST */
.chatItem{
  background:var(--card);
  padding:10px;
  border-radius:10px;
  margin-bottom:6px;
  display:flex;
  justify-content:space-between;
}

/* ONLINE DOT */
.dot{
  width:10px;height:10px;border-radius:50%;
  background:green;
}

/* CHAT BOX */
.chatBox{
  height:55vh;
  overflow:auto;
  background:var(--card);
  padding:10px;
  border-radius:10px;
}

/* MESSAGE */
.msg{
  padding:8px;
  margin:5px;
  border-radius:10px;
  max-width:70%;
}
.me{background:var(--accent);margin-left:auto;}
.other{background:#ddd;}

img{max-width:100%;border-radius:10px;}

/* NAV */
.nav{
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
  background:var(--primary);
}
.nav button{
  flex:1;
  color:#fff;
  background:none;
  border:none;
}

input,button{
  width:100%;
  padding:10px;
  margin:5px 0;
  border:none;
  border-radius:8px;
}
button{
  background:var(--primary);
  color:#fff;
}
</style>
</head>

<body>

<header>
RedChaat v10
<button onclick="toggleTheme()">🌗</button>
</header>

<!-- AUTH -->
<div id="auth" class="screen active">
<input id="lid" placeholder="User ID">
<input id="lpass" placeholder="Password">
<button onclick="login()">Login</button>

<input id="sid" placeholder="New ID">
<input id="spass" placeholder="Password">
<button onclick="signup()">Signup</button>
</div>

<!-- CHATS -->
<div id="chats" class="screen">
<button onclick="addFriend()">➕ Add Friend</button>
<div id="chatList"></div>
</div>

<!-- CHAT -->
<div id="chatWindow" class="screen">
<button onclick="back()">⬅</button>
<h3 id="chatName"></h3>
<p id="typing"></p>

<div class="chatBox" id="chatBox"></div>

<input id="msg" placeholder="Message">
<button onclick="send()">Send</button>
<button onclick="sendImage()">📷</button>
</div>

<!-- STATUS -->
<div id="status" class="screen">
<input id="statusText">
<button onclick="addStatus()">Post</button>
<button onclick="addPhotoStatus()">📷</button>
<div id="statusList"></div>
</div>

<div class="nav hidden" id="nav">
<button onclick="show('chats')">Chats</button>
<button onclick="show('status')">Status</button>
</div>

<script>
const db="https://redchaat-ffad2-default-rtdb.firebaseio.com/";
let user=localStorage.getItem("user");
let current=null;

/* THEME */
function toggleTheme(){
 document.body.classList.toggle("dark");
 localStorage.setItem("theme",document.body.classList.contains("dark"));
}
if(localStorage.getItem("theme")=="true") document.body.classList.add("dark");

/* AUTH */
async function signup(){
 await fetch(db+"users/"+sid.value+".json",{method:"PUT",body:JSON.stringify({password:spass.value,friends:{},online:true})});
 alert("Done");
}
async function login(){
 let r=await fetch(db+"users/"+lid.value+".json");
 let d=await r.json();
 if(!d||d.password!=lpass.value)return alert("Error");
 localStorage.setItem("user",lid.value);
 location.reload();
}

/* INIT */
if(user){
 auth.classList.remove("active");
 nav.classList.remove("hidden");
 show("chats");
 loadChats();
 setInterval(loadChats,3000);
 setInterval(()=>setOnline(true),5000);
}

/* ONLINE */
async function setOnline(status){
 await fetch(db+"users/"+user+"/online.json",{method:"PUT",body:JSON.stringify(status)});
}

/* FRIEND */
async function addFriend(){
 let f=prompt("Friend ID");
 let check=await fetch(db+"users/"+f+".json");
 if(!await check.json())return alert("Not found");

 await fetch(db+"users/"+user+"/friends/"+f+".json",{method:"PUT",body:"true"});
 await fetch(db+"users/"+f+"/friends/"+user+".json",{method:"PUT",body:"true"});
 loadChats();
}

/* CHAT LIST */
async function loadChats(){
 let r=await fetch(db+"users/"+user+"/friends.json");
 let d=await r.json();
 chatList.innerHTML="";

 if(!d)return;

 for(let f in d){
  let u=await fetch(db+"users/"+f+".json");
  let ud=await u.json();

  let div=document.createElement("div");
  div.className="chatItem";

  div.innerHTML = f + (ud.online?" 🟢":"");

  div.onclick=()=>openChat(f);
  chatList.appendChild(div);
 }
}

/* CHAT */
function cid(a,b){return a<b?a+"_"+b:b+"_"+a;}

function openChat(f){
 current=f;
 chatName.innerText=f;
 show("chatWindow");
 loadChat();
 setInterval(loadChat,2000);
}

/* SEND */
async function send(){
 let id=Date.now();
 await fetch(db+"chats/"+cid(user,current)+"/"+id+".json",{
  method:"PUT",
  body:JSON.stringify({from:user,text:msg.value,time:id,seen:false})
 });
 msg.value="";
}

/* IMAGE */
function sendImage(){
 let i=document.createElement("input");
 i.type="file";
 i.onchange=()=>{
  let r=new FileReader();
  r.onload=()=>{
    fetch(db+"chats/"+cid(user,current)+"/"+Date.now()+".json",{
      method:"PUT",
      body:JSON.stringify({from:user,img:r.result})
    });
  };
  r.readAsDataURL(i.files[0]);
 };
 i.click();
}

/* LOAD CHAT */
async function loadChat(){
 let r=await fetch(db+"chats/"+cid(user,current)+".json");
 let d=await r.json();
 chatBox.innerHTML="";

 if(!d)return;

 Object.entries(d).forEach(([id,m])=>{
  let div=document.createElement("div");
  div.className="msg "+(m.from==user?"me":"other");

  if(m.text) div.innerText=m.text;
  if(m.img){
    let img=document.createElement("img");
    img.src=m.img;
    div.appendChild(img);
  }

  // seen tick
  if(m.from==user){
    let tick=document.createElement("div");
    tick.innerText=m.seen?"✔✔":"✔";
    div.appendChild(tick);
  }else{
    fetch(db+"chats/"+cid(user,current)+"/"+id+"/seen.json",{method:"PUT",body:"true"});
  }

  chatBox.appendChild(div);
 });

 chatBox.scrollTop=chatBox.scrollHeight;
}

/* STATUS */
async function addStatus(){
 await fetch(db+"status/"+user+"/"+Date.now()+".json",{
  method:"PUT",
  body:JSON.stringify({text:statusText.value,time:Date.now()})
 });
 loadStatus();
}

function addPhotoStatus(){
 let i=document.createElement("input");
 i.type="file";
 i.onchange=()=>{
  let r=new FileReader();
  r.onload=()=>{
    fetch(db+"status/"+user+"/"+Date.now()+".json",{
      method:"PUT",
      body:JSON.stringify({img:r.result,time:Date.now()})
    });
    loadStatus();
  };
  r.readAsDataURL(i.files[0]);
 };
 i.click();
}

async function loadStatus(){
 let r=await fetch(db+"status.json");
 let d=await r.json();
 statusList.innerHTML="";

 if(!d)return;

 Object.entries(d).forEach(([u,s])=>{
  Object.values(s).forEach(st=>{
    if(Date.now()-st.time<86400000){
      let div=document.createElement("div");
      div.innerText=u+": ";
      if(st.text) div.innerText+=st.text;
      if(st.img){
        let img=document.createElement("img");
        img.src=st.img;
        div.appendChild(img);
      }
      statusList.appendChild(div);
    }
  });
 });
}

/* NAV */
function show(s){
 document.querySelectorAll(".screen").forEach(e=>e.classList.remove("active"));
 document.getElementById(s).classList.add("active");
}

function back(){show("chats");}
</script>

</body>
</html>
