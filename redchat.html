<script>
// ================= FIREBASE API =================
const DB_URL = "https://radica-super-app-18cb3-default-rtdb.firebaseio.com/redchat";
let currentUser = null;
let currentChatFriendId = null;
let currentChatFriendName = null;
let isOneTimeMode = false;
let chatSyncInterval = null;

// ================= AUTHENTICATION =================
function toggleAuth(type) {
    document.getElementById('login-form').style.display = type === 'login' ? 'block' : 'none';
    document.getElementById('register-form').style.display = type === 'register' ? 'block' : 'none';
    document.getElementById('forgot-form').style.display = type === 'forgot' ? 'block' : 'none';
}

async function register() {
    try {
        let rawId = document.getElementById('reg-id').value.trim();
        // ID থেকে স্পেস এবং স্পেশাল ক্যারেক্টার বাদ দেওয়া (Firebase এর নিয়মানুযায়ী)
        let id = rawId.toLowerCase().replace(/[^a-z0-9_]/g, ''); 
        
        let name = document.getElementById('reg-name').value.trim();
        let pass = document.getElementById('reg-pass').value;
        let qEle = document.getElementById('reg-q');
        let q = qEle.options[qEle.selectedIndex].text;
        let ans = document.getElementById('reg-ans').value.trim();

        if(!rawId || !name || !pass || !ans) return alert("সব তথ্য পূরণ করুন!");
        if(id === '') return alert("ID-তে শুধু ইংরেজি অক্ষর বা সংখ্যা ব্যবহার করুন।");
        
        let btn = document.querySelector('#register-form button');
        btn.innerText = "অ্যাকাউন্ট তৈরি হচ্ছে... ⏳";
        btn.disabled = true;

        const res = await fetch(`${DB_URL}/users/${id}.json`);
        const existingData = await res.json();

        if(existingData) {
            btn.innerText = "অ্যাকাউন্ট খুলুন";
            btn.disabled = false;
            return alert("❌ এই ID টি আগে থেকেই ব্যবহার করা হচ্ছে। অন্য ID দিন।");
        }

        let userData = { name: name, pass: pass, secQ: q, secAns: ans, friends: {} };
        const putRes = await fetch(`${DB_URL}/users/${id}.json`, { method: 'PUT', body: JSON.stringify(userData) });
        
        if(!putRes.ok) throw new Error("ডেটাবেস কানেকশন এরর!");

        alert(`✅ অ্যাকাউন্ট সফলভাবে তৈরি হয়েছে!\nআপনার চ্যাট ID হলো: ${id}\n\nএবার লগইন করুন।`);
        
        btn.innerText = "অ্যাকাউন্ট খুলুন";
        btn.disabled = false;
        
        document.getElementById('login-id').value = id; // লগইনে অটোমেটিক ID বসিয়ে দেওয়া
        document.getElementById('login-pass').value = '';
        toggleAuth('login');

    } catch(e) {
        alert("❌ সমস্যা হয়েছে: " + e.message);
        let btn = document.querySelector('#register-form button');
        btn.innerText = "অ্যাকাউন্ট খুলুন";
        btn.disabled = false;
    }
}

async function login() {
    try {
        let rawId = document.getElementById('login-id').value.trim();
        let id = rawId.toLowerCase().replace(/[^a-z0-9_]/g, ''); 
        let pass = document.getElementById('login-pass').value;
        
        if(!id || !pass) return alert("ID এবং পাসওয়ার্ড দিন!");

        let btn = document.querySelector('#login-form button');
        btn.innerText = "লগইন হচ্ছে... ⏳";
        btn.disabled = true;

        const res = await fetch(`${DB_URL}/users/${id}.json`);
        const data = await res.json();

        if(!data || data.pass !== pass) {
            btn.innerText = "লগইন করুন";
            btn.disabled = false;
            return alert("❌ ID বা পাসওয়ার্ড ভুল!");
        }
        
        currentUser = { id, name: data.name };
        document.getElementById('auth-screen').style.display = 'none';
        document.getElementById('app-container').style.display = 'flex';
        document.getElementById('user-name-display').innerText = data.name;
        loadFriendsAndChats();
    } catch(e) {
        alert("❌ লগইন করতে সমস্যা হচ্ছে: " + e.message);
        let btn = document.querySelector('#login-form button');
        btn.innerText = "লগইন করুন";
        btn.disabled = false;
    }
}

// ================= PASSWORD RECOVERY =================
let recTargetId = null;
async function checkSecurityQuestion() {
    let id = document.getElementById('forgot-id').value.trim().toLowerCase().replace(/[^a-z0-9_]/g, '');
    if(!id) return alert("ID দিন!");
    
    document.querySelector('#forgot-form button').innerText = "খোঁজ করা হচ্ছে... ⏳";
    const res = await fetch(`${DB_URL}/users/${id}.json`);
    const data = await res.json();
    
    document.querySelector('#forgot-form button').innerText = "অ্যাকাউন্ট খুঁজুন";
    
    if(!data) return alert("এই ID পাওয়া যায়নি!");
    recTargetId = id;
    document.getElementById('rec-q-text').innerText = "প্রশ্ন: " + data.secQ;
    document.getElementById('recovery-area').style.display = 'block';
}

async function resetPassword() {
    let ans = document.getElementById('rec-ans').value.trim();
    let newPass = document.getElementById('new-pass').value;
    if(!ans || !newPass) return alert("সব ঘর পূরণ করুন!");

    const res = await fetch(`${DB_URL}/users/${recTargetId}.json`);
    const data = await res.json();

    if(data.secAns.toLowerCase() !== ans.toLowerCase()) return alert("❌ উত্তর ভুল হয়েছে!");
    
    await fetch(`${DB_URL}/users/${recTargetId}/pass.json`, { method: 'PUT', body: JSON.stringify(newPass) });
    alert("✅ পাসওয়ার্ড পরিবর্তন হয়েছে! নতুন পাসওয়ার্ড দিয়ে লগইন করুন।");
    toggleAuth('login');
}

// ================= NAVIGATION & FRIENDS =================
function switchTab(tab) {
    document.getElementById('tab-chats').style.display = tab === 'chats' ? 'block' : 'none';
    document.getElementById('tab-status').style.display = tab === 'status' ? 'block' : 'none';
    document.getElementById('tab-friends').style.display = tab === 'friends' ? 'block' : 'none';
    
    document.querySelectorAll('.nav-tabs div').forEach(el => el.classList.remove('active'));
    event.target.classList.add('active');
    
    if(tab === 'friends') loadFriendsAndChats();
}

async function sendFriendReq() {
    let fId = document.getElementById('add-friend-id').value.trim().toLowerCase().replace(/[^a-z0-9_]/g, '');
    if(!fId || fId === currentUser.id) return alert("সঠিক ID দিন!");
    
    const res = await fetch(`${DB_URL}/users/${fId}.json`);
    const data = await res.json();
    if(!data) return alert("এই ID-র কেউ নেই!");

    await fetch(`${DB_URL}/users/${fId}/requests/${currentUser.id}.json`, { method: 'PUT', body: JSON.stringify(currentUser.name) });
    alert(`✅ ${data.name}-কে ফ্রেন্ড রিকোয়েস্ট পাঠানো হয়েছে!`);
    document.getElementById('add-friend-id').value = '';
}

async function acceptReq(fId, fName) {
    await fetch(`${DB_URL}/users/${currentUser.id}/friends/${fId}.json`, { method: 'PUT', body: JSON.stringify(fName) });
    await fetch(`${DB_URL}/users/${fId}/friends/${currentUser.id}.json`, { method: 'PUT', body: JSON.stringify(currentUser.name) });
    await fetch(`${DB_URL}/users/${currentUser.id}/requests/${fId}.json`, { method: 'DELETE' });
    loadFriendsAndChats();
}

async function loadFriendsAndChats() {
    const res = await fetch(`${DB_URL}/users/${currentUser.id}.json`);
    const data = await res.json();
    
    let reqHtml = '';
    if(data.requests) {
        Object.entries(data.requests).forEach(([id, name]) => {
            reqHtml += `<div style="background:#fce7f3; padding:10px; margin-bottom:5px; border-radius:8px; display:flex; justify-content:space-between; align-items:center;"><b>${name}</b> <button onclick="acceptReq('${id}','${name}')" style="background:#be185d; color:white; border:none; padding:5px 10px; border-radius:5px; cursor:pointer;">Accept</button></div>`;
        });
    }
    document.getElementById('friend-requests-box').innerHTML = reqHtml;

    let frHtml = ''; let chatHtml = '';
    if(data.friends) {
        Object.entries(data.friends).forEach(([id, name]) => {
            frHtml += `<div style="padding:10px; border-bottom:1px solid #ddd; background:white; margin-bottom:5px; border-radius:5px;">👤 <b>${name}</b> <span style="color:gray; font-size:12px;">(${id})</span></div>`;
            chatHtml += `
            <div class="chat-list-item" onclick="openChat('${id}', '${name}')">
                <div class="avatar">${name.charAt(0)}</div>
                <div><b>${name}</b><br><small style="color:gray;">চ্যাট করতে ক্লিক করুন</small></div>
            </div>`;
        });
    } else {
        chatHtml = `<p style="text-align:center; padding:20px; color:gray;">কোনো ফ্রেন্ড নেই। "ফ্রেন্ডস" ট্যাবে গিয়ে আইডি দিয়ে ফ্রেন্ড অ্যাড করুন।</p>`;
        frHtml = `<p style="text-align:center; color:gray;">আপনার ফ্রেন্ড লিস্ট ফাঁকা।</p>`;
    }
    document.getElementById('friends-list-box').innerHTML = frHtml;
    document.getElementById('tab-chats').innerHTML = chatHtml;
}

// ================= CHATTING SYSTEM =================
function getChatId(id1, id2) { return id1 < id2 ? `${id1}_${id2}` : `${id2}_${id1}`; }

function openChat(fId, fName) {
    currentChatFriendId = fId;
    currentChatFriendName = fName;
    document.getElementById('main-nav').style.display = 'none';
    document.querySelectorAll('.content-area').forEach(el => el.style.display = 'none');
    document.getElementById('chat-room').style.display = 'flex';
    document.getElementById('chat-title').innerText = fName;
    document.getElementById('chat-avatar').innerText = fName.charAt(0);
    
    if(chatSyncInterval) clearInterval(chatSyncInterval);
    loadMessages();
    chatSyncInterval = setInterval(loadMessages, 3000); 
}

function closeChat() {
    document.getElementById('chat-room').style.display = 'none';
    document.getElementById('main-nav').style.display = 'flex';
    document.getElementById('tab-chats').style.display = 'block';
    if(chatSyncInterval) clearInterval(chatSyncInterval);
}

function toggleOneTime() {
    isOneTimeMode = !isOneTimeMode;
    document.getElementById('onetime-btn').className = isOneTimeMode ? 'onetime-toggle active' : 'onetime-toggle';
    if(isOneTimeMode) alert("💣 ওয়ান-টাইম মোড চালু! মেসেজ বা ছবি একবার দেখলেই গায়েব হয়ে যাবে।");
}

async function sendMsg(imgBase64 = null) {
    let text = document.getElementById('msg-input').value.trim();
    if(!text && !imgBase64) return;

    document.getElementById('msg-input').value = ''; // টাইপ করা মুছে দেওয়া
    
    let chatId = getChatId(currentUser.id, currentChatFriendId);
    let msgId = "msg_" + Date.now();
    let msgData = {
        sender: currentUser.id,
        text: text,
        img: imgBase64,
        type: isOneTimeMode ? 'onetime' : 'normal',
        time: Date.now(),
        viewed: false
    };

    await fetch(`${DB_URL}/chats/${chatId}/${msgId}.json`, { method: 'PUT', body: JSON.stringify(msgData) });
    
    isOneTimeMode = false; 
    document.getElementById('onetime-btn').className = 'onetime-toggle';
    loadMessages();
}

function sendImage(event) {
    let file = event.target.files[0];
    if(!file) return;
    let reader = new FileReader();
    reader.onload = function(e) {
        let img = new Image();
        img.onload = function() {
            let canvas = document.createElement('canvas');
            let scale = 400 / img.width;
            canvas.width = 400; canvas.height = img.height * scale;
            canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
            sendMsg(canvas.toDataURL('image/jpeg', 0.6));
        }
        img.src = e.target.result;
    }
    reader.readAsDataURL(file);
}

async function loadMessages() {
    let chatId = getChatId(currentUser.id, currentChatFriendId);
    const res = await fetch(`${DB_URL}/chats/${chatId}.json`);
    const msgs = await res.json();
    
    let msgArea = document.getElementById('message-area');
    msgArea.innerHTML = '';
    
    if(!msgs) return;

    let now = Date.now();

    Object.entries(msgs).forEach(([msgId, m]) => {
        let isMe = m.sender === currentUser.id;
        let timeStr = new Date(m.time).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
        
        let canDelete = isMe && (now - m.time <= 15 * 60 * 1000);
        let delBtnHtml = canDelete ? `<button class="del-btn" onclick="deleteMsg('${msgId}')">✖</button>` : '';

        if(m.type === 'onetime') {
            if(isMe) {
                msgArea.innerHTML += `
                <div class="msg sent">
                    ${delBtnHtml}
                    <i>💣 [ওয়ান-টাইম পাঠানো হয়েছে]</i><br>
                    ${m.img ? `<img src="${m.img}" style="width:100%; border-radius:10px; margin-top:5px;">` : m.text}
                    <span class="msg-time">${timeStr}</span>
                </div>`;
            } else {
                if(m.viewed) {
                    msgArea.innerHTML += `<div class="msg received" style="color:gray; font-style:italic;">💣 ওয়ান-টাইম মেসেজটি দেখা হয়ে গেছে।</div>`;
                } else {
                    msgArea.innerHTML += `
                    <div class="msg received one-time-box" onclick="viewOneTime('${msgId}', this, '${m.text}', '${m.img}')">
                        💣 একটি ওয়ান-টাইম মেসেজ এসেছে। দেখতে এখানে ক্লিক করুন।
                    </div>`;
                }
            }
        } 
        else {
            let contentHtml = m.img ? `<img src="${m.img}" style="width:100%; border-radius:10px; margin-bottom:5px;"><br>${m.text}` : m.text;
            msgArea.innerHTML += `
            <div class="msg ${isMe ? 'sent' : 'received'}">
                ${delBtnHtml}
                ${contentHtml}
                <span class="msg-time">${timeStr}</span>
            </div>`;
        }
    });
    msgArea.scrollTop = msgArea.scrollHeight; // স্ক্রোল নিচে রাখা
}

async function viewOneTime(msgId, el, text, img) {
    let contentHtml = img !== 'undefined' && img !== 'null' ? `<img src="${img}" style="width:100%; border-radius:10px;"><br>${text}` : text;
    el.innerHTML = contentHtml + `<br><small style="color:red; font-weight:bold;">(এটি ব্যাক করলেই মুছে যাবে)</small>`;
    el.style.background = 'white'; el.style.color = 'black'; el.style.border = '2px solid #ef4444';
    el.onclick = null; 

    let chatId = getChatId(currentUser.id, currentChatFriendId);
    await fetch(`${DB_URL}/chats/${chatId}/${msgId}/viewed.json`, { method: 'PUT', body: true });
}

async function deleteMsg(msgId) {
    if(confirm("মেসেজটি ডিলিট করতে চান? (সবার জন্য মুছে যাবে)")) {
        let chatId = getChatId(currentUser.id, currentChatFriendId);
        await fetch(`${DB_URL}/chats/${chatId}/${msgId}.json`, { method: 'DELETE' });
        loadMessages();
    }
}
</script>
