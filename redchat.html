<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>🔥 RedChaat v6</title>

<style>
:root{
  --grad: linear-gradient(45deg,#ff2e63,#ff6b6b,#4facfe,#f9d423);
}
body{margin:0;font-family:sans-serif;background:#111;color:#fff;}
header{
  background:var(--grad);
  padding:12px;
  text-align:center;
  font-weight:bold;
}

.screen{display:none;padding:10px;}
.active{display:block;}

.chatBox{
  height:55vh;
  overflow:auto;
  background:#1a1a1a;
  padding:10px;
  border-radius:10px;
}

.msg{
  padding:8px;
  margin:5px;
  border-radius:10px;
  max-width:70%;
}
.me{background:#00c853;margin-left:auto;}
.other{background:#444;}

.tick{font-size:10px;opacity:0.7;margin-left:5px;}

.bottom{
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
  background:#000;
}
.bottom button{
  flex:1;
  background:none;
  color:#fff;
  border:none;
  padding:10px;
}

/* STATUS FULL SCREEN */
#viewer{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:#000;
  display:none;
  justify-content:center;
  align-items:center;
  flex-direction:column;
}

#viewer img{
  max-width:100%;
  max-height:80%;
}

</style>
</head>

<body>

<header>🔥 RedChaat v6</header>

<!-- AUTH -->
<div id="auth" class="screen active">
<input id="id" placeholder="User ID">
<input id="pass" placeholder="Password">
<button onclick="login()">Login</button>
<button onclick="signup()">Signup</button>
</div>

<!-- CHAT -->
<div id="chatScreen" class="screen">
<button onclick="back()">⬅</button>
<h3 id="chatName"></h3>
<div class="chatBox" id="chatBox"></div>

<input id="msg">
<button onclick="send()">Send</button>
</div>

<!-- STATUS -->
<div id="statusScreen" class="screen">
<button onclick="show('chatScreen')">⬅</button>
<input id="st">
<button onclick="postStatus()">Post</button>
<div id="statusList"></div>
</div>

<!-- VIEWER -->
<div id="viewer" onclick="this.style.display='none'">
<img id="viewImg">
<p id="viewUser"></p>
</div>

<!-- NAV -->
<div class="bottom hidden" id="nav">
<button onclick="show('chatScreen')">Chat</button>
<button onclick="show('statusScreen')">Status</button>
</div>

<script>
const db="https://redchaat-ffad2-default-rtdb.firebaseio.com/";
let user=localStorage.getItem("user");
let current="friend";

/* AUTH */
async function signup(){
 await fetch(db+"users/"+id.value+".json",{
  method:"PUT",
  body:JSON.stringify({password:pass.value})
 });
 alert("Done");
}
async function login(){
 let r=await fetch(db+"users/"+id.value+".json");
 let d=await r.json();
 if(!d||d.password!=pass.value)return alert("Error");
 localStorage.setItem("user",id.value);
 location.reload();
}

/* INIT */
if(user){
 auth.classList.remove("active");
 nav.classList.remove("hidden");
 show("chatScreen");
 loadChat();
 setInterval(loadChat,2000);
 loadStatus();
}

/* CHAT */
function cid(a,b){return a<b?a+"_"+b:b+"_"+a;}

async function send(){
 let id=Date.now();
 await fetch(db+"chats/"+cid(user,current)+"/"+id+".json",{
  method:"PUT",
  body:JSON.stringify({from:user,text:msg.value,seen:false})
 });
 msg.value="";
}

async function loadChat(){
 let r=await fetch(db+"chats/"+cid(user,current)+".json");
 let d=await r.json();
 chatBox.innerHTML="";
 if(!d)return;

 Object.entries(d).forEach(([id,m])=>{
  let div=document.createElement("div");
  div.className="msg "+(m.from==user?"me":"other");

  let tick="";
  if(m.from==user){
    tick=m.seen?"✔✔":"✔";
  }else{
    fetch(db+"chats/"+cid(user,current)+"/"+id+"/seen.json",
    {method:"PUT",body:"true"});
  }

  div.innerHTML=m.text+" <span class='tick'>"+tick+"</span>";
  chatBox.appendChild(div);
 });

 chatBox.scrollTop=chatBox.scrollHeight;
}

/* STATUS */
async function postStatus(){
 let id=Date.now();
 await fetch(db+"status/"+user+"/"+id+".json",{
  method:"PUT",
  body:JSON.stringify({img:null,text:st.value,time:id})
 });
 loadStatus();
}

async function loadStatus(){
 let r=await fetch(db+"status.json");
 let d=await r.json();
 statusList.innerHTML="";

 if(!d)return;

 Object.entries(d).forEach(([u,s])=>{
  Object.values(s).forEach(st=>{
    let div=document.createElement("div");
    div.innerText=u+": "+(st.text||"photo");

    div.onclick=()=>{
      viewer.style.display="flex";
      viewUser.innerText=u;
      viewImg.src=st.img||"";
    };

    statusList.appendChild(div);
  });
 });
}

/* NAV */
function show(s){
 document.querySelectorAll(".screen").forEach(e=>e.classList.remove("active"));
 document.getElementById(s).classList.add("active");
}

function back(){show("chatScreen");}
</script>

</body>
</html>
