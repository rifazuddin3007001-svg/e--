<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>e-র (ইরা) | রেডিকা প্রজাতন্ত্র</title>
    <style>
        :root { --primary: #004a99; --accent: #ffb400; --bg-dark: #001f3f; --white: #ffffff; }
        body { 
            font-family: 'Hind Siliguri', sans-serif; 
            margin: 0; padding: 0; 
            background: radial-gradient(circle at center, #003366 0%, #001122 100%);
            background-attachment: fixed;
            color: #333;
            overflow-x: hidden;
        }
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-image: 
                linear-gradient(rgba(0, 74, 153, 0.1) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 74, 153, 0.1) 1px, transparent 1px);
            background-size: 30px 30px;
            z-index: -1;
        }
        header { background: rgba(255, 255, 255, 0.95); padding: 15px 25px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 15px rgba(0,0,0,0.3); position: sticky; top: 0; z-index: 100; backdrop-filter: blur(5px); }
        .logo { font-size: 26px; font-weight: 800; color: var(--primary); cursor: pointer; }
        .logo span { color: var(--accent); }
        .container { max-width: 500px; margin: 20px auto; padding: 0 15px; position: relative; z-index: 1; }
        .welcome-banner { 
            background: linear-gradient(135deg, rgba(0, 74, 153, 0.9), rgba(0, 51, 102, 0.9)); 
            color: white; padding: 25px; border-radius: 20px; margin-bottom: 25px; position: relative; 
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            border: 1px solid rgba(255,255,255,0.1);
        }
        .change-name { position: absolute; top: 10px; right: 15px; font-size: 11px; background: rgba(255,255,255,0.2); padding: 2px 8px; border-radius: 10px; cursor: pointer; }
        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .menu-item { 
            background: rgba(255, 255, 255, 0.9); 
            padding: 20px; border-radius: 18px; text-align: center; cursor: pointer; 
            transition: 0.3s; box-shadow: 0 4px 6px rgba(0,0,0,0.1); 
            border: 1px solid transparent; 
            backdrop-filter: blur(10px);
        }
        .menu-item:hover { border-color: var(--accent); transform: translateY(-5px); background: #fff; }
        .icon { font-size: 30px; margin-bottom: 10px; display: block; }
        .sos-btn { background: #ff4d4d; color: white; text-align: center; padding: 15px; border-radius: 15px; margin-top: 25px; font-weight: bold; cursor: pointer; box-shadow: 0 5px 15px rgba(255,77,77,0.4); }
        
        /* Modal Styles */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.75); z-index: 1000; justify-content: center; align-items: center; backdrop-filter: blur(8px); }
        .modal-content { background: white; width: 95%; max-width: 480px; max-height: 85vh; overflow-y: auto; padding: 25px; border-radius: 20px; position: relative; animation: slideIn 0.3s ease; }
        @keyframes slideIn { from { transform: translateY(50px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .close-btn { position: absolute; top: 15px; right: 15px; font-size: 24px; cursor: pointer; z-index: 10; background: rgba(255,255,255,0.8); border-radius: 50%; width: 30px; height: 30px; display: flex; justify-content: center; align-items: center; }
        
        /* Game Styles */
        .game-board { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 20px; perspective: 1000px; }
        .card { width: 100%; aspect-ratio: 1; cursor: pointer; position: relative; transform-style: preserve-3d; transition: transform 0.5s; }
        .card.flipped { transform: rotateY(180deg); }
        .card .front, .card .back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 10px; display: flex; flex-direction: column; align-items: center; justify-content: center; box-shadow: 0 4px 6px rgba(0,0,0,0.1); padding: 5px; box-sizing: border-box; text-align: center; }
        .card .back { background: linear-gradient(135deg, var(--primary), #002244); color: var(--accent); font-size: 30px; transform: rotateY(0deg); border: 2px solid var(--accent); }
        .card .front { background: white; color: var(--primary); transform: rotateY(180deg); border: 2px solid var(--primary); font-size: 13px; font-weight: bold; }
        .card .front span { font-size: 28px; margin-bottom: 5px; display: block; }
        .game-stats { display: flex; justify-content: space-between; margin-top: 15px; font-weight: bold; color: var(--primary); }
        .play-btn { background: var(--primary); color: white; border: none; padding: 10px 20px; border-radius: 10px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 15px; }
    </style>
</head>
<body onload="checkUser()">

<header>
    <div class="logo" onclick="location.reload()">e-<span>র</span> (ERA)</div>
    <div id="userIdDisplay" style="font-size: 11px; background: #eee; padding: 4px 10px; border-radius: 15px; border: 1px solid #ccc;">আইডি লোড হচ্ছে...</div>
</header>

<div class="container">
    <div class="welcome-banner">
        <span class="change-name" onclick="resetName()">নাম পরিবর্তন</span>
        <h2 id="greetingText">নমস্কার!</h2>
        <p>ব্যালেন্স: <b style="color:var(--accent)"><span id="quantBalance">৫,৪৫০</span> 𝐐 (কোয়ান্ট)</b></p>
    </div>

    <div class="menu-grid">
        <div class="menu-item" onclick="openModal('map')"><span class="icon">🗺️</span><h3>মানচিত্র</h3></div>
        <div class="menu-item" onclick="openModal('const')"><span class="icon">📜</span><h3>সংবিধান</h3></div>
        <div class="menu-item" onclick="openModal('game')"><span class="icon">🎮</span><h3>রেডিকা গেম</h3></div>
        <div class="menu-item" onclick="openModal('transport')"><span class="icon">🚆</span><h3>যাতায়াত</h3></div>
        <div class="menu-item" onclick="openModal('education')"><span class="icon">🎓</span><h3>শিক্ষা</h3></div>
        <div class="menu-item" onclick="openModal('market')"><span class="icon">🛒</span><h3>বাজার</h3></div>
    </div>

    <div class="sos-btn" onclick="window.location.href='https://wa.me/918597290189?text=জরুরি%20সাহায্য%20প্রয়োজন!'">জরুরি সাহায্য (SOS)</div>
</div>

<div id="infoModal" class="modal">
    <div class="modal-content">
        <span class="close-btn" onclick="closeModal()">×</span>
        <h2 id="modalTitle" style="color: var(--primary); margin-top: 0;">টাইটেল</h2>
        <div id="modalBody"></div>
    </div>
</div>

<script>
    // User Balance Logic
    let balance = localStorage.getItem("quantBalance") ? parseInt(localStorage.getItem("quantBalance")) : 5450;
    
    function checkUser() {
        let name = localStorage.getItem("userName");
        if (!name) {
            name = prompt("রেডিকা প্রজাতন্ত্রে আপনাকে স্বাগতম! আপনার নাম লিখুন:");
            if (!name) name = "রেডিকাবাসী";
            localStorage.setItem("userName", name);
        }
        document.getElementById("greetingText").innerText = "নমস্কার, " + name + "!";
        document.getElementById("userIdDisplay").innerText = "ID: RD-" + Math.floor(1000 + Math.random() * 9000);
        document.getElementById("quantBalance").innerText = balance.toLocaleString('bn-IN');
    }

    function resetName() { localStorage.removeItem("userName"); location.reload(); }
    
    function updateBalance(amount) {
        balance += amount;
        localStorage.setItem("quantBalance", balance);
        document.getElementById("quantBalance").innerText = balance.toLocaleString('bn-IN');
    }

    // App Data
    const data = {
        map: { title: "প্রশাসনিক মানচিত্র", content: `<p>রেডিকার জেলাসমূহ:</p><ul><li>🏛️ প্রজ্ঞাকেন্দ্র (বর্ধমান)</li><li>📚 মেধাভূমি (দেবীপুর)</li><li>🏥 আরোগ্যনগর (মগরা)</li><li>⚔️ শৌর্যপুর (পাণ্ডুয়া)</li><li>🎨 সৃষ্টিশিলা (মেমারি)</li><li>🌳 সবুজায়ন (দেবীপুর গ্রিন জোন)</li></ul>` },
        const: { title: "সংবিধান", content: `<p>১০০ বছরের প্রাচীন গাছ 'পরম বৃক্ষ' মর্যাদা পাইবে। ৫৩% মুনাফা জনকল্যাণে ব্যয় হইবে।</p>` },
        transport: { title: "যাতায়াত সেবা", content: `<ul style="list-style:none; padding:0;"><li>🚆 RailYatri</li></ul>` },
        education: { title: "শিক্ষা ও জ্ঞান", content: `<ul style="list-style:none; padding:0;"><li>📚 ওপেন লাইব্রেরি</li></ul>` },
        market: { title: "রেডিকা বাজার", content: `<ul style="list-style:none; padding:0;"><li>🛍️ ফ্লিপকার্ট</li></ul>` },
        game: { title: "রেডিকা মেমরি চ্যালেঞ্জ 🎮", content: `
            <p style="font-size:14px; text-align:center;">দুটি একই জেলার কার্ড মিলিয়ে ১০০ কোয়ান্ট (Q) জিতে নিন!</p>
            <div class="game-stats"><span>চাল: <span id="moves">0</span></span><span>জোড়া মিলেছে: <span id="matches">0</span>/6</span></div>
            <div id="gameBoard" class="game-board"></div>
            <button class="play-btn" onclick="initGame()">নতুন গেম শুরু করুন</button>
        `}
    };

    function openModal(category) {
        document.getElementById('modalTitle').innerText = data[category].title;
        document.getElementById('modalBody').innerHTML = data[category].content;
        document.getElementById('infoModal').style.display = "flex";
        if (category === 'game') setTimeout(initGame, 100);
    }
    function closeModal() { document.getElementById('infoModal').style.display = "none"; }

    // Game Logic
    const districts = [
        { name: "প্রজ্ঞাকেন্দ্র", icon: "🏛️" }, { name: "মেধাভূমি", icon: "📚" },
        { name: "আরোগ্যনগর", icon: "🏥" }, { name: "শৌর্যপুর", icon: "⚔️" },
        { name: "সৃষ্টিশিলা", icon: "⚙️" }, { name: "সবুজায়ন", icon: "🌳" }
    ];
    let cards = [], hasFlippedCard = false, lockBoard = false, firstCard, secondCard;
    let matches = 0, moves = 0;

    function initGame() {
        matches = 0; moves = 0;
        document.getElementById('moves').innerText = moves;
        document.getElementById('matches').innerText = matches;
        const gameBoard = document.getElementById('gameBoard');
        gameBoard.innerHTML = '';
        cards = [...districts, ...districts];
        cards.sort(() => Math.random() - 0.5); // Shuffle

        cards.forEach((dist, index) => {
            const cardElement = document.createElement('div');
            cardElement.classList.add('card');
            cardElement.dataset.name = dist.name;
            cardElement.innerHTML = `
                <div class="back">R</div>
                <div class="front"><span>${dist.icon}</span>${dist.name}</div>
            `;
            cardElement.addEventListener('click', flipCard);
            gameBoard.appendChild(cardElement);
        });
    }

    function flipCard() {
        if (lockBoard) return;
        if (this === firstCard) return;

        this.classList.add('flipped');

        if (!hasFlippedCard) {
            hasFlippedCard = true;
            firstCard = this;
            return;
        }

        secondCard = this;
        moves++;
        document.getElementById('moves').innerText = moves;
        checkForMatch();
    }

    function checkForMatch() {
        let isMatch = firstCard.dataset.name === secondCard.dataset.name;
        isMatch ? disableCards() : unflipCards();
    }

    function disableCards() {
        firstCard.removeEventListener('click', flipCard);
        secondCard.removeEventListener('click', flipCard);
        matches++;
        document.getElementById('matches').innerText = matches;
        resetBoard();

        if (matches === 6) {
            setTimeout(() => {
                alert("🎉 অভিনন্দন! আপনি সবকটি জেলা মিলিয়েছেন! পুরস্কার হিসেবে ১০০ কোয়ান্ট (Q) যোগ করা হলো।");
                updateBalance(100);
            }, 500);
        }
    }

    function unflipCards() {
        lockBoard = true;
        setTimeout(() => {
            firstCard.classList.remove('flipped');
            secondCard.classList.remove('flipped');
            resetBoard();
        }, 1000);
    }

    function resetBoard() {
        [hasFlippedCard, lockBoard] = [false, false];
        [firstCard, secondCard] = [null, null];
    }
</script>

</body>
</html>
